    <script>
        // ==================== 调试配置 ====================
        const DEBUG = false;
        const log = (...args) => { if (DEBUG) console.log(...args); };

        // ==================== 蓝牙配置 ====================
        const SERVICE_UUID = 0xFFF0;
        const DATA_CHAR_UUID = 0xFFF1;
        const CTRL_CHAR_UUID = 0xFFF2;
        const TARE_CMD = new Uint8Array([0xA5, 0x5A, 0x03, 0x0D, 0x00, 0x02, 0x00, 0x00, 0x00, 0x71]);

        // ==================== 状态机 ====================
        const STATES = {
            IDLE: 'idle',
            CONFIGURED: 'configured',
            WEIGHING: 'weighing',
            ADD_POWDER: 'addPowder',
            COUNTDOWN: 'countdown',
            BREWING: 'brewing',
            END: 'end'
        };

        const STATE_LABELS = {
            [STATES.IDLE]: 'Idle',
            [STATES.CONFIGURED]: '已配置',
            [STATES.WEIGHING]: '称重',
            [STATES.ADD_POWDER]: '加粉',
            [STATES.COUNTDOWN]: '倒计时',
            [STATES.BREWING]: '冲煮',
            [STATES.END]: '完成'
        };

        // ==================== 意式咖啡状态 ====================
        const ESPRESSO_STATES = {
            IDLE: 'idle',
            COUNTDOWN: 'countdown',
            BREWING: 'brewing',
            END: 'end'
        };

        let espressoState = ESPRESSO_STATES.IDLE;
        let espressoStartTime = 0;
        let espressoInterval = null;
        let espressoStableWeight = 0;
        let espressoStableTime = 0;
        let espressoLastChangeTime = 0; // 最后一次重量变化的时间（兼容旧字段）
        // 稳定判定配置
        const STABLE_THRESHOLD = 1; // 克，变化低于此视为稳定
        const STABLE_CONFIRM_MS = 3000; // 毫秒，稳定需持续时长（3秒）
        // 用于记录最后一次显著变化的时间与重量（稳定判定起点）
        let espressoLastSignificantChangeTime = 0;
        let espressoLastSignificantWeight = 0;
        let espressoFinalWeight = 0;
        let espressoFinalTime = 0;
        const ESPRESSO_PREINFUSION = 5;

        // ==================== 全局变量 ====================
        let device = null, server = null, dataChar = null, ctrlChar = null;
        let connected = false;
        let isConnecting = false;
        let currentState = STATES.IDLE;
        let currentPage = 'scale';

        let currentWeight = 0;
        let lastWeight = 0;
        let lastTime = 0;
        let smoothFlow = 0;
        let coffeeWeight = 0;

        let isRecording = false;
        let recordStartTime = 0;
        let recordInterval = null;
        let weightData = [];
        let maxRecordedWeight = 0;
        let lowWeightCount = 0;
        let finalWaterWeight = 0;

        let countdown = 0;
        let countdownInterval = null;

        // 当前方案
        let currentRecipe = null;
        let currentStageIndex = -1;
        let stageCompletedFlags = [];
        let stageWaterAccum = []; // 每段累计水量
        let stageTargets = []; // 每段动态目标水量
        let stageStopNotified = []; // 每段提前喊停提示
        let recipeConfigured = false;
        let totalPouredWater = 0;
        let brewUiFrozen = false;
        let dataNotificationsPaused = false;

        // 方案列表
        let recipes = [];
        let editingRecipeId = null;

        // 历史记录
        let history = JSON.parse(localStorage.getItem('brewHistory') || '[]');
        let currentHistoryIndex = -1;

        // ==================== 默认方案 ====================
        const DEFAULT_RECIPES = [
            {
                id: 'three-stage',
                name: '标准三段式',
                ratio: '1:15',
                stages: [
                    { weight: 3, targetFlow: 4, stopEarly: 4 },
                    { weight: 8, targetFlow: 4, stopEarly: 4 },
                    { weight: 7, targetFlow: 4, stopEarly: 4 }
                ]
            },
            {
                id: 'one-pour',
                name: '一刀流',
                ratio: '1:15',
                stages: [
                    { weight: 18, targetFlow: 4, stopEarly: 4 }
                ]
            },
            {
                id: 'two-stage',
                name: '两段式',
                ratio: '1:15',
                stages: [
                    { weight: 5, targetFlow: 4, stopEarly: 4 },
                    { weight: 13, targetFlow: 4, stopEarly: 4 }
                ]
            }
        ];

        function cloneDefaults() {
            try {
                if (typeof structuredClone === 'function') return structuredClone(DEFAULT_RECIPES);
            } catch (e) {}
            return JSON.parse(JSON.stringify(DEFAULT_RECIPES));
        }

        function parseRatioValue(ratioText) {
            if (typeof ratioText !== 'string') return 15;
            const m = ratioText.match(/(\d+(?:\.\d+)?)\s*:\s*(\d+(?:\.\d+)?)/);
            if (m) {
                const right = parseFloat(m[2]);
                return right > 0 ? right : 15;
            }
            const n = parseFloat(ratioText);
            return Number.isFinite(n) && n > 0 ? n : 15;
        }

        function normalizeRecipe(recipe) {
            const ratioValue = parseRatioValue(recipe && recipe.ratio);
            const stagesRaw = Array.isArray(recipe && recipe.stages) ? recipe.stages : [];
            const stages = stagesRaw.map((s, i) => {
                const w = parseFloat(s.weight);
                const weight = Number.isFinite(w) && w > 0 ? w : (i + 1);
                const targetFlow = Number.isFinite(parseFloat(s.targetFlow)) && parseFloat(s.targetFlow) > 0 ? parseFloat(s.targetFlow) : 4;
                const stopEarly = Number.isFinite(parseFloat(s.stopEarly)) && parseFloat(s.stopEarly) >= 0 ? parseFloat(s.stopEarly) : 4;
                return { weight, targetFlow, stopEarly };
            });
            return {
                id: recipe && recipe.id ? recipe.id : ('custom-' + Date.now()),
                name: recipe && recipe.name ? recipe.name : '自定义方案',
                ratio: '1:' + ratioValue,
                stages: stages.length > 0 ? stages : [{ weight: 1, targetFlow: 4, stopEarly: 4 }]
            };
        }

        function computeStageTargets(powderWeight) {
            if (!currentRecipe || !Array.isArray(currentRecipe.stages)) return [];
            const pw = Math.max(0, Number(powderWeight) || 0);
            const ratio = parseRatioValue(currentRecipe.ratio);
            const totalWater = pw * ratio;
            const totalWeight = currentRecipe.stages.reduce((sum, s) => sum + (Number(s.weight) || 0), 0) || 1;
            return currentRecipe.stages.map(s => totalWater * ((Number(s.weight) || 0) / totalWeight));
        }

        function getCumulativeTargets(targets) {
            const result = [];
            let sum = 0;
            (targets || []).forEach(v => {
                sum += Number(v) || 0;
                result.push(sum);
            });
            return result;
        }

        // ==================== DOM 元素 ====================
        const brewWeightEl = document.getElementById('brewWeight');
        const scaleWeightEl = document.getElementById('scaleWeight');
        const flowEl = document.getElementById('flowRate');
        const timerEl = document.getElementById('timer');
        const statusDot = document.getElementById('statusDot');
        const deviceNameEl = document.getElementById('deviceName');
        const stateBadge = document.getElementById('stateBadge');
        const connectBtn = document.getElementById('connectBtn');
        const mainBtn = document.getElementById('mainBtn');
        const tareBtn = document.getElementById('tareBtn');
        const guideIcon = document.getElementById('guideIcon');
        const guideText = document.getElementById('guideText');
        const guideSub = document.getElementById('guideSub');
        const weightStatus = document.getElementById('weightStatus');
        const flowStatus = document.getElementById('flowStatus');
        const completedPanel = document.getElementById('completedPanel');
        const completedTimeEl = document.getElementById('completedTime');
        const completedWaterEl = document.getElementById('completedWater');
        const completedStageList = document.getElementById('completedStageList');
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const historyCanvas = document.getElementById('historyChart');
        const historyCtx = historyCanvas.getContext('2d');

        // ==================== 初始化 ====================
        function init() {
            loadRecipes();
            selectRecipe(recipes[0]);
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            renderHistory();
            renderRecipePageList();
        }

        // ==================== 页面切换 ====================
        function switchToPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            currentPage = page;

            switch (page) {
                case 'scale':
                    document.getElementById('scalePage').classList.add('active');
                    break;
                case 'brew':
                    document.getElementById('brewPage').classList.add('active');
                    break;
                case 'espresso':
                    document.getElementById('espressoPage').classList.add('active');
                    updateEspressoUI();
                    break;
                case 'recipe':
                    document.getElementById('recipePage').classList.add('active');
                    renderRecipePageList();
                    break;
                case 'history':
                    document.getElementById('historyPage').classList.add('active');
                    renderHistory();
                    break;
            }
        }

        function enterBrewMode() {
            if (!connected) return;
            // 进入手冲模式 → 去皮 → 加粉状态
            switchToPage('brew');
            mainBtn.disabled = true;
            mainBtn.textContent = '准备中...';
            sendTare().then(() => {
                coffeeWeight = 0;
                currentWeight = 0;
                brewWeightEl.textContent = '0.0';
                setTimeout(() => setState(STATES.ADD_POWDER), 500);
            });
        }

        function exitBrewMode() {
            if (currentState === STATES.BREWING || currentState === STATES.COUNTDOWN) {
                if (!confirm('冲煮进行中，确定退出吗？')) return;
            }
            resetBrew();
            setState(connected ? STATES.WEIGHING : STATES.IDLE);
            switchToPage('scale');
        }

        function enterEspressoMode() {
            if (!connected) return;
            switchToPage('espresso');
            espressoState = ESPRESSO_STATES.IDLE;
            updateEspressoUI();
        }

        function exitEspressoMode() {
            if (espressoState === ESPRESSO_STATES.BREWING || espressoState === ESPRESSO_STATES.COUNTDOWN) {
                if (!confirm('萃取进行中，确定退出吗？')) return;
            }
            resetEspresso();
            switchToPage('scale');
        }

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 16;
            canvas.height = 100;
            drawChart();
        }

        // ==================== 方案管理 ====================
        function loadRecipes() {
            const saved = localStorage.getItem('brewRecipes');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (!Array.isArray(parsed)) throw new Error('Invalid');
                    const migrated = parsed.map(r => normalizeRecipe(r));
                    if (migrated.length > 0) {
                        recipes = migrated;
                    } else {
                        localStorage.removeItem('brewRecipes');
                        recipes = cloneDefaults();
                        saveRecipes();
                    }
                } catch (e) {
                    localStorage.removeItem('brewRecipes');
                    recipes = cloneDefaults();
                    saveRecipes();
                }
            } else {
                recipes = cloneDefaults();
                saveRecipes();
            }
        }

        function saveRecipes() {
            localStorage.setItem('brewRecipes', JSON.stringify(recipes));
        }

        function selectRecipe(recipe) {
            currentRecipe = normalizeRecipe(recipe);

            // 切换方案时清空旧状态，避免旧阶段缓存污染
            currentStageIndex = -1;
            stageCompletedFlags = [];
            stageWaterAccum = [];
            stageTargets = [];
            stageStopNotified = [];
            recipeConfigured = false;
            totalPouredWater = 0;
            brewUiFrozen = false;

            const track = document.getElementById('progressTrack');
            const labels = document.getElementById('progressLabels');
            if (track) track.innerHTML = '';
            if (labels) labels.innerHTML = '';

            document.getElementById('recipeName').textContent = currentRecipe.name;
            document.getElementById('recipeRatio').textContent = '\u7C89\u6C34\u6BD4 1:' + parseRatioValue(currentRecipe.ratio);
            document.getElementById('progressStageLabel').textContent = '\u9636\u6BB5 1/' + currentRecipe.stages.length;
            document.getElementById('progressTargetLabel').textContent = '0 / 0g';

            const powderForPreview = currentState === STATES.ADD_POWDER
                ? Math.max(0, currentWeight)
                : Math.max(0, coffeeWeight);
            updateAddPowderRecipe(powderForPreview);

            if (powderForPreview > 0) {
                stageTargets = computeStageTargets(powderForPreview);
                if (currentState === STATES.CONFIGURED || currentState === STATES.COUNTDOWN || currentState === STATES.BREWING || currentState === STATES.END) {
                    renderProgressBar();
                    updateProgressBar(Math.max(0, currentWeight));
                }
            }

            renderRecipePageList();
        }

        function updateAddPowderRecipe(cw) {
            if (!currentRecipe) return;
            const powder = Math.max(0, Number(cw) || 0);
            const targets = powder > 0 ? computeStageTargets(powder) : new Array(currentRecipe.stages.length).fill(0);
            const cumulative = getCumulativeTargets(targets);

            // 预览数据直接与当前方案同步，防止显示旧方案缓存
            stageTargets = powder > 0 ? targets.slice() : [];

            const stagesEl = document.getElementById('recipeStages');
            stagesEl.innerHTML = currentRecipe.stages.map((s, i) => {
                return '<span class="stage-tag" id="stageTag' + i + '">第' + (i + 1) + '段：目标至 ' + (cumulative[i] || 0).toFixed(0) + 'g</span>';
            }).join('');
        }

        async function pauseDataNotifications() {
            if (!dataChar || dataNotificationsPaused) return;
            try { await dataChar.stopNotifications(); } catch (e) {}
            try { dataChar.removeEventListener('characteristicvaluechanged', onData); } catch (e) {}
            dataNotificationsPaused = true;
        }

        async function resumeDataNotifications() {
            if (!dataChar || !dataNotificationsPaused) return;
            try { await dataChar.startNotifications(); } catch (e) {}
            try { dataChar.removeEventListener('characteristicvaluechanged', onData); } catch (e) {}
            dataChar.addEventListener('characteristicvaluechanged', onData);
            dataNotificationsPaused = false;
        }

        function renderRecipePageList() {
            const list = document.getElementById('recipePageList');
            const isDefault = (id) => DEFAULT_RECIPES.find(d => d.id === id);
            list.innerHTML = recipes.map(r => {
                const sel = currentRecipe && currentRecipe.id === r.id ? ' selected' : '';
                const delBtn = !isDefault(r.id) ? '<button class="recipe-item-btn" style="color:#f87171;border-color:#f87171;" onclick="event.stopPropagation();deleteRecipeDirect(\'' + r.id + '\')">删除</button>' : '';
                return '<div class="recipe-item' + sel + '" onclick="selectRecipeFromPage(\'' + r.id + '\')">' +
                    '<div style="display:flex;justify-content:space-between;align-items:center;">' +
                    '<div><div class="recipe-item-name">' + r.name + '</div>' +
                    '<div class="recipe-item-info">\u7C89\u6C34\u6BD4 ' + r.ratio + ' \xB7 ' + r.stages.length + '\u6BB5\u6CE8\u6C34</div></div>' +
                    '<div style="display:flex;gap:8px;">' +
                    '<button class="recipe-item-btn" onclick="event.stopPropagation();showRecipeEditor(\'' + r.id + '\')">编辑</button>' +
                    delBtn + '</div></div>' +
                    '<div class="recipe-item-stages">' + r.stages.map(s => '<span class="recipe-item-stage">W' + (Number(s.weight) || 0).toFixed(0) + '</span>').join('') + '</div>' +
                    '</div>';
            }).join('');
        }

        function selectRecipeFromPage(id) {
            const recipe = recipes.find(r => r.id === id);
            if (recipe) {
                selectRecipe(recipe);
                switchToPage('brew');
                // 如果当前是加粉状态，保持该状态
                if (currentState === STATES.ADD_POWDER) {
                    updateUI();
                } else {
                    enterBrewMode();
                }
            }
        }

        function showRecipeEditor(id) {
            editingRecipeId = id;
            const recipe = id ? recipes.find(r => r.id === id) : null;
            document.getElementById('editorTitle').textContent = recipe ? '编辑方案' : '新建方案';
            document.getElementById('editName').value = recipe ? recipe.name : '';
            document.getElementById('editRatio').value = recipe ? ('1:' + parseRatioValue(recipe.ratio)) : '1:15';
            document.getElementById('deleteRecipeBtn').style.display = recipe && !DEFAULT_RECIPES.find(d => d.id === recipe.id) ? 'block' : 'none';
            renderStageEditor(recipe ? recipe.stages : [{ weight: 1, targetFlow: 4, stopEarly: 4 }]);
            document.getElementById('editorModal').classList.add('show');
        }

        function closeEditor() {
            document.getElementById('editorModal').classList.remove('show');
        }

        function renderStageEditor(stages) {
            const list = document.getElementById('stageEditorList');
            list.innerHTML = stages.map((s, i) => {
                const del = stages.length > 1 ? '<button class="recipe-item-btn" onclick="removeStage(' + i + ')">删除</button>' : '';
                return '<div class="stage-config">' +
                    '<div class="stage-config-header"><span class="stage-config-title">阶段 ' + (i+1) + '</span>' + del + '</div>' +
                    '<div class="stage-config-row">' +
                    '<div class="stage-config-field"><label>权重</label><input type="number" step="1" value="' + (s.weight || 1) + '" id="stageWeight' + i + '"></div>' +
                    '<div class="stage-config-field"><label>目标流速 g/s</label><input type="number" step="0.5" value="' + s.targetFlow + '" id="stageFlow' + i + '"></div>' +
                    '<div class="stage-config-field"><label>提前喊停 g</label><input type="number" value="' + s.stopEarly + '" id="stageStop' + i + '"></div>' +
                    '</div></div>';
            }).join('');
        }

        function addStage() {
            const stages = getStagesFromEditor();
            stages.push({ weight: 1, targetFlow: 4, stopEarly: 4 });
            renderStageEditor(stages);
        }

        function removeStage(index) {
            const stages = getStagesFromEditor();
            stages.splice(index, 1);
            renderStageEditor(stages);
        }

        function getStagesFromEditor() {
            const list = document.getElementById('stageEditorList');
            const configs = list.querySelectorAll('.stage-config');
            const stages = [];
            configs.forEach((_, i) => {
                stages.push({
                    weight: parseFloat(document.getElementById('stageWeight' + i).value) || 1,
                    targetFlow: parseFloat(document.getElementById('stageFlow' + i).value) || 4,
                    stopEarly: parseFloat(document.getElementById('stageStop' + i).value) || 4
                });
            });
            return stages;
        }

        function saveRecipe() {
            const name = document.getElementById('editName').value.trim();
            const ratio = document.getElementById('editRatio').value.trim();
            const stages = getStagesFromEditor();
            const ratioValue = parseRatioValue(ratio);

            if (!name) { alert('请输入方案名称'); return; }
            if (!stages.length) { alert('请至少保留一个注水阶段'); return; }
            if (ratioValue <= 0 || stages.some(s => s.weight <= 0 || s.targetFlow <= 0 || s.stopEarly < 0)) {
                alert('请填写有效的方案参数（必须大于 0）');
                return;
            }

            if (editingRecipeId) {
                const index = recipes.findIndex(r => r.id === editingRecipeId);
                if (index >= 0) {
                    recipes[index] = normalizeRecipe({ ...recipes[index], name, ratio: '1:' + ratioValue, stages });
                }
            } else {
                recipes.push(normalizeRecipe({ id: 'custom-' + Date.now(), name, ratio: '1:' + ratioValue, stages }));
            }
            saveRecipes();
            closeEditor();
            renderRecipePageList();
            switchToPage('recipe');
        }

        function deleteRecipe() {
            if (!editingRecipeId) return;
            deleteRecipeDirect(editingRecipeId);
            closeEditor();
        }

        function deleteRecipeDirect(id) {
            if (!confirm('确定删除此方案？')) return;
            recipes = recipes.filter(r => r.id !== id);
            if (currentRecipe && currentRecipe.id === id) {
                if (recipes.length === 0) recipes = cloneDefaults();
                selectRecipe(recipes[0]);
            }
            saveRecipes();
            renderRecipePageList();
        }

        // ==================== 蓝牙连接 ====================
        async function connect() {
            if (isConnecting) return;
            if (connected) { disconnect(); return; }

            isConnecting = true;
            try {
                statusDot.classList.add('connecting');
                deviceNameEl.textContent = '扫描中...';
                connectBtn.disabled = true;

                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'TIMEMORE' }],
                    optionalServices: [SERVICE_UUID]
                });

                deviceNameEl.textContent = '连接中...';
                device.addEventListener('gattserverdisconnected', onDisconnected);

                await new Promise(r => setTimeout(r, 100));
                server = await device.gatt.connect();
                await new Promise(r => setTimeout(r, 200));

                const service = await server.getPrimaryService(SERVICE_UUID);
                const [data, ctrl] = await Promise.all([
                    service.getCharacteristic(DATA_CHAR_UUID),
                    service.getCharacteristic(CTRL_CHAR_UUID)
                ]);

                dataChar = data;
                ctrlChar = ctrl;

                await dataChar.startNotifications();
                dataChar.addEventListener('characteristicvaluechanged', onData);

                connected = true;
                statusDot.classList.remove('connecting');
                statusDot.classList.add('connected');
                deviceNameEl.textContent = device.name || 'TIMEMORE DOT';
                connectBtn.textContent = '断开连接';
                connectBtn.classList.add('connected');
                connectBtn.disabled = false;

                // 启用模式按钮
                document.getElementById('scaleTareBtn').disabled = false;
                document.getElementById('brewModeBtn').disabled = false;
                document.getElementById('espressoModeBtn').disabled = false;
                document.getElementById('espressoTareBtn').disabled = false;
                document.getElementById('espressoMainBtn').disabled = false;

                setState(STATES.WEIGHING);

            } catch (e) {
                statusDot.classList.remove('connecting');
                deviceNameEl.textContent = '连接失败';
                connectBtn.disabled = false;
                console.error(e);
                // 清理部分连接状态
                if (device) {
                    try { device.removeEventListener('gattserverdisconnected', onDisconnected); } catch(ex) {}
                    try { if (device.gatt.connected) device.gatt.disconnect(); } catch(ex) {}
                }
                device = null; server = null; dataChar = null; ctrlChar = null;
            } finally {
                isConnecting = false;
            }
        }

        async function disconnect() {
            if (!device) {
                cleanupConnection();
                return;
            }
            connectBtn.disabled = true;
            deviceNameEl.textContent = '断开中...';
            try {
                if (dataChar) {
                    try { await dataChar.stopNotifications(); } catch(e) {}
                    try { dataChar.removeEventListener('characteristicvaluechanged', onData); } catch(e) {}
                }
                if (device.gatt.connected) {
                    device.gatt.disconnect();
                    // gattserverdisconnected 事件会触发 onDisconnected
                    // 超时保护：3秒内未收到断开回调则强制清理
                    setTimeout(() => {
                        if (connected) {
                            log('断开超时，强制清理');
                            cleanupConnection();
                        }
                    }, 3000);
                } else {
                    cleanupConnection();
                }
            } catch (e) {
                console.error('断开失败:', e);
                cleanupConnection();
            }
        }

        function onDisconnected() {
            cleanupConnection();
        }

        function cleanupConnection() {
            connected = false;
            isConnecting = false;
            dataNotificationsPaused = false;
            try { if (dataChar) dataChar.removeEventListener('characteristicvaluechanged', onData); } catch(e) {}
            try { if (device) device.removeEventListener('gattserverdisconnected', onDisconnected); } catch(e) {}
            dataChar = null; ctrlChar = null; server = null; device = null;

            statusDot.classList.remove('connected', 'connecting');
            deviceNameEl.textContent = '未连接';
            connectBtn.textContent = '连接电子秤';
            connectBtn.classList.remove('connected');
            connectBtn.disabled = false;

            // 禁用模式按钮
            document.getElementById('scaleTareBtn').disabled = true;
            document.getElementById('brewModeBtn').disabled = true;
            document.getElementById('espressoModeBtn').disabled = true;

            scaleWeightEl.textContent = '0.0';
            brewWeightEl.textContent = '0.0';

            resetBrew();
            resetEspresso();
            setState(STATES.IDLE);
            if (currentPage === 'brew' || currentPage === 'espresso') {
                switchToPage('scale');
            }
        }

        // ==================== 数据处理 ====================
        function onData(e) {
            if (brewUiFrozen && currentState === STATES.END) return;

            const data = new Uint8Array(e.target.value.buffer);

            if (data[0] === 0xA5 && data[1] === 0x5A && data.length >= 10) {
                const raw = (data[8] << 8) | data[9];
                const weight = raw > 30000 ? (raw - 65536) * 0.1 : raw * 0.1;

                const now = Date.now();
                let flow = 0;

                if (lastTime > 0 && isRecording) {
                    const dt = (now - lastTime) / 1000;
                    if (dt > 0) {
                        flow = Math.max(0, (weight - lastWeight) / dt);
                        updateFlowStatus(flow);
                    }
                }

                currentWeight = weight;
                lastWeight = weight;
                lastTime = now;

                // 更新所有重量显示
                scaleWeightEl.textContent = weight.toFixed(1);
                brewWeightEl.textContent = weight.toFixed(1);
                brewWeightEl.classList.toggle('negative', weight < 0);

                const espressoWeightEl = document.getElementById('espressoWeight');
                if (espressoWeightEl) espressoWeightEl.textContent = weight.toFixed(1);

                // 意式咖啡稳定检测
                if (espressoState === ESPRESSO_STATES.BREWING) {
                    checkEspressoStable(weight);
                }

                // 在加粉状态下实时更新
                if (currentState === STATES.ADD_POWDER) {
                    guideSub.textContent = '\u5F53\u524D\u7C89\u91CD: ' + weight.toFixed(1) + 'g';
                    mainBtn.disabled = weight < 2;
                    updateAddPowderRecipe(weight);
                }

                if (isRecording) {
                    if (weight > maxRecordedWeight) maxRecordedWeight = weight;

                    // 以真实秤重作为累计注水基准，并保持单调递增，避免慢速注水抖动积分漂移
                    const brewWaterNow = Math.max(0, weight);
                    totalPouredWater = Math.max(totalPouredWater, brewWaterNow);

                    // 检测滤杯移走：只有所有阶段都完成才能自动结束
                    const allStagesCompleted = stageCompletedFlags.every(f => f === true);
                    
                    if (allStagesCompleted) {
                        const plannedTotal = stageTargets.reduce((sum, v) => sum + (Number(v) || 0), 0);
                        const effectiveTotal = Math.max(plannedTotal, totalPouredWater, maxRecordedWeight, 0);
                        const dropThreshold = Math.max(6, effectiveTotal * 0.25);
                        const dropAmount = effectiveTotal - weight;
                        const cupRemovedShock = weight < -5 && dropAmount > Math.max(10, effectiveTotal * 0.5);

                        if ((dropAmount > dropThreshold && effectiveTotal >= Math.max(10, plannedTotal * 0.8)) || cupRemovedShock) {
                            lowWeightCount++;
                            if (lowWeightCount >= 3) {
                                finalWaterWeight = Math.max(totalPouredWater, maxRecordedWeight, 0);
                                stopRecord();
                                stopFlowBeep();
                                // 修复：截断数据时正确找到下降起始点
                                let cutIndex = weightData.length;
                                for (let i = weightData.length - 1; i >= 1; i--) {
                                    if (weightData[i - 1].weight > weightData[i].weight + 2) {
                                        cutIndex = i;
                                        break;
                                    }
                                }
                                weightData = weightData.slice(0, cutIndex);
                                speak('冲煮结束');
                                finalizeBrewCompletion();
                                return;
                            }
                        } else {
                            lowWeightCount = 0;
                        }
                    } else {
                        lowWeightCount = 0;
                    }

                    const elapsed = (now - recordStartTime) / 1000;

                    // 数据验证：过滤异常的重量下降
                    if (weightData.length > 0) {
                        const lastData = weightData[weightData.length - 1];
                        const weightDrop = lastData.weight - weight;
                        if (weightDrop > 5) {
                            log('忽略异常数据:', weight.toFixed(1));
                            lastTime = now;
                            return;
                        }
                    }

                    weightData.push({ time: elapsed, weight, flow: smoothFlow });
                    if (weightData.length > 2400) weightData.shift();

                    checkStageCompletion(totalPouredWater);
                    updateProgressBar(totalPouredWater);
                }
            }
        }

        // 流速提醒
        let flowBeepInterval = null;
        let lastFlowStatus = null;
        let flowStatusStartTime = 0;
        const FLOW_STATUS_DELAY = 200;
        let currentBeepType = null;

        function updateFlowStatus(flow) {
            if (flow > 20) return;

            smoothFlow = smoothFlow * 0.85 + flow * 0.15;
            flowEl.textContent = smoothFlow.toFixed(1);

            if (!currentRecipe || currentStageIndex < 0) {
                stopFlowBeep();
                return;
            }

            const stage = currentRecipe.stages[currentStageIndex];
            const targetFlow = stage.targetFlow;
            const ratio = smoothFlow / targetFlow;

            let newStatus = '', statusClass = '', beepInterval = 0, beepType = null;

            if (smoothFlow < 0.5) {
                newStatus = ''; statusClass = '';
            } else if (ratio < 0.9) {
                newStatus = '偏低'; statusClass = 'low'; beepInterval = 800; beepType = 'low';
            } else if (ratio <= 1.3) {
                newStatus = '正常'; statusClass = 'normal';
            } else if (ratio <= 1.5) {
                newStatus = '偏快'; statusClass = 'high'; beepInterval = 400; beepType = 'high';
            } else {
                newStatus = '过快'; statusClass = 'danger'; beepInterval = 200; beepType = 'high';
            }

            flowStatus.textContent = newStatus;
            flowStatus.className = 'flow-status ' + statusClass;

            if (statusClass !== lastFlowStatus) {
                flowStatusStartTime = Date.now();
                lastFlowStatus = statusClass;
                stopFlowBeep();
            }

            if (beepInterval > 0 && Date.now() - flowStatusStartTime >= FLOW_STATUS_DELAY) {
                if (!flowBeepInterval || currentBeepType !== beepType) {
                    stopFlowBeep();
                    currentBeepType = beepType;
                    startFlowBeep(beepInterval, beepType);
                }
            }
        }

        function startFlowBeep(interval, type) {
            if (flowBeepInterval) return;
            playFlowBeep(type);
            flowBeepInterval = setInterval(() => playFlowBeep(type), interval);
        }

        function playFlowBeep(type) {
            if (type === 'low') beep(300, 150, 'sine');
            else beep(1500, 50, 'square');
        }

        function stopFlowBeep() {
            if (flowBeepInterval) { clearInterval(flowBeepInterval); flowBeepInterval = null; }
        }

        // ==================== 状态机 ====================
        function setState(state) {
            currentState = state;
            stateBadge.textContent = STATE_LABELS[state] || state;
            stateBadge.className = 'state-badge ' + (state === STATES.BREWING ? 'brewing' : '');
            updateUI();
        }

        function updateUI() {
            switch (currentState) {
                case STATES.IDLE:
                    guideIcon.textContent = '🔗';
                    guideText.textContent = '请连接电子秤';
                    guideSub.textContent = '点击底部按钮连接';
                    mainBtn.disabled = true;
                    mainBtn.textContent = '开始冲煮';
                    tareBtn.style.display = 'none';
                    document.getElementById('recipeSection').style.display = 'none';
                    document.getElementById('brewProgress').style.display = 'none';
                    document.getElementById('metricsSection').style.display = 'none';
                    document.getElementById('chartSection').style.display = 'none';
                    completedPanel.style.display = 'none';
                    weightStatus.style.display = 'block';
                    break;

                case STATES.WEIGHING:
                    // 称重模式 — 此状态只在 scalePage 上有意义
                    break;

                case STATES.ADD_POWDER:
                    guideIcon.textContent = '☕';
                    guideText.textContent = '请加入咖啡粉';
                    guideSub.textContent = '\u5F53\u524D\u7C89\u91CD: ' + currentWeight.toFixed(1) + 'g';
                    mainBtn.disabled = currentWeight < 2;
                    mainBtn.textContent = '开始冲煮';
                    tareBtn.textContent = '取消';
                    tareBtn.style.display = '';
                    tareBtn.disabled = false;
                    document.getElementById('recipeSection').style.display = 'block';
                    document.getElementById('brewProgress').style.display = 'none';
                    document.getElementById('metricsSection').style.display = 'none';
                    document.getElementById('chartSection').style.display = 'none';
                    completedPanel.style.display = 'none';
                    weightStatus.style.display = 'block';
                    break;

                case STATES.CONFIGURED:
                    guideIcon.textContent = '✅';
                    guideText.textContent = '配置完成';
                    guideSub.textContent = '准备进入倒计时';
                    mainBtn.disabled = true;
                    mainBtn.textContent = '准备中...';
                    tareBtn.style.display = 'none';
                    document.getElementById('recipeSection').style.display = 'block';
                    document.getElementById('brewProgress').style.display = 'block';
                    document.getElementById('metricsSection').style.display = 'flex';
                    document.getElementById('chartSection').style.display = 'none';
                    completedPanel.style.display = 'none';
                    weightStatus.style.display = 'none';
                    break;

                case STATES.COUNTDOWN:
                    guideIcon.textContent = '⏱️';
                    guideText.textContent = '' + countdown;
                    guideSub.textContent = '';
                    mainBtn.disabled = true;
                    mainBtn.textContent = countdown + '...';
                    tareBtn.style.display = 'none';
                    document.getElementById('recipeSection').style.display = 'block';
                    document.getElementById('brewProgress').style.display = 'block';
                    document.getElementById('metricsSection').style.display = 'flex';
                    document.getElementById('chartSection').style.display = 'none';
                    completedPanel.style.display = 'none';
                    weightStatus.style.display = 'none';
                    renderProgressBar();
                    break;

                case STATES.BREWING:
                    updateBrewingUI();
                    tareBtn.style.display = 'none';
                    document.getElementById('recipeSection').style.display = 'block';
                    document.getElementById('brewProgress').style.display = 'block';
                    document.getElementById('metricsSection').style.display = 'flex';
                    document.getElementById('chartSection').style.display = 'block';
                    completedPanel.style.display = 'none';
                    weightStatus.style.display = 'none';
                    break;

                case STATES.END:
                    guideIcon.textContent = '🎉';
                    guideText.textContent = '冲煮完成！';
                    guideSub.textContent = '\u603B\u6CE8\u6C34\u91CF: ' + finalWaterWeight.toFixed(0) + 'g';
                    brewWeightEl.textContent = finalWaterWeight.toFixed(1);
                    mainBtn.disabled = false;
                    mainBtn.textContent = '返回称重';
                    tareBtn.style.display = '';
                    tareBtn.textContent = '再来一杯';
                    tareBtn.disabled = false;
                    document.getElementById('recipeSection').style.display = 'block';
                    document.getElementById('brewProgress').style.display = 'none';
                    document.getElementById('metricsSection').style.display = 'none';
                    document.getElementById('chartSection').style.display = 'none';
                    completedPanel.style.display = 'block';
                    weightStatus.style.display = 'block';
                    weightStatus.innerHTML = '<span style="color:#4ade80">\u603B\u6CE8\u6C34\u91CF ' + finalWaterWeight.toFixed(0) + 'g</span>';
                    break;
            }
        }

        function updateBrewingUI() {
            const stage = currentRecipe.stages[currentStageIndex];
            const cumulativeTargets = getCumulativeTargets(stageTargets);
            const targetWater = cumulativeTargets[currentStageIndex] || 0;

            if (stageCompletedFlags[currentStageIndex]) {
                guideIcon.textContent = '⏳';
                guideText.textContent = '等待滴滤完成';
                if (currentStageIndex < currentRecipe.stages.length - 1) {
                    guideSub.textContent = '继续注水';
                } else {
                    guideSub.textContent = '拿走滤杯自动完成';
                }
            } else {
                guideIcon.textContent = '💧';
                guideText.textContent = '阶段' + (currentStageIndex + 1) + '：注水至 ' + targetWater.toFixed(0) + 'g';
                guideSub.textContent = '';
            }

            mainBtn.disabled = false;
            mainBtn.textContent = '结束冲煮';

            // 更新进度条信息
            updateProgressInfo();
        }

        // ==================== 新版进度条 ====================
        function renderProgressBar() {
            if (!currentRecipe || !stageTargets.length) return;

            const totalWater = stageTargets.reduce((sum, v) => sum + (Number(v) || 0), 0) || 1;
            const cumulativeTargets = getCumulativeTargets(stageTargets);
            const track = document.getElementById('progressTrack');
            const labels = document.getElementById('progressLabels');

            // 构建累计进度轴（0 -> totalWater）
            let trackHTML = '<div class="progress-bar-fill active" id="progressBarFill" style="width:0%"></div>';
            let labelsHTML = '';

            cumulativeTargets.forEach((target, i) => {
                const offset = Math.max(0, Math.min(100, (target / totalWater) * 100));
                if (i < cumulativeTargets.length - 1) {
                    trackHTML += '<div class="progress-marker" style="left:' + offset + '%"></div>';
                }
                labelsHTML += '<div class="progress-label-item" id="pLabel' + i + '" style="left:' + offset + '%">' +
                    target.toFixed(0) + 'g</div>';
            });

            track.innerHTML = trackHTML;
            labels.innerHTML = labelsHTML;

            if (currentStageIndex < 0) {
                const stageLabel = document.getElementById('progressStageLabel');
                const targetLabel = document.getElementById('progressTargetLabel');
                stageLabel.textContent = '\u9636\u6BB5 1/' + currentRecipe.stages.length;
                targetLabel.textContent = '0 / ' + (cumulativeTargets[0] || 0).toFixed(0) + 'g';
            }

            updateProgressInfo();
        }

        function updateProgressInfo() {
            if (currentStageIndex < 0 || !currentRecipe) return;
            const stages = currentRecipe.stages;
            const label = document.getElementById('progressStageLabel');
            const target = document.getElementById('progressTargetLabel');
            const cumulativeTargets = getCumulativeTargets(stageTargets);
            const currentTarget = cumulativeTargets[currentStageIndex] || 0;
            const currentAccum = Math.max(0, Number(totalPouredWater) || 0);

            label.textContent = '\u9636\u6BB5 ' + (currentStageIndex + 1) + '/' + stages.length;
            target.textContent = currentAccum.toFixed(0) + ' / ' + currentTarget.toFixed(0) + 'g';
        }

        function updateProgressBar(weight) {
            if (currentStageIndex < 0 || !currentRecipe) return;

            const totalWater = stageTargets.reduce((sum, v) => sum + (Number(v) || 0), 0) || 1;
            const overallProgress = (Math.max(0, Number(weight) || 0) / totalWater) * 100;
            const fill = document.getElementById('progressBarFill');
            if (fill) fill.style.width = Math.min(100, overallProgress) + '%';

            // 更新标签样式
            currentRecipe.stages.forEach((s, i) => {
                const labelEl = document.getElementById('pLabel' + i);
                if (!labelEl) return;
                if (i < currentStageIndex || stageCompletedFlags[i]) {
                    labelEl.className = 'progress-label-item completed';
                } else if (i === currentStageIndex) {
                    labelEl.className = 'progress-label-item active';
                } else {
                    labelEl.className = 'progress-label-item';
                }
            });

            updateProgressInfo();
        }

        function checkStageCompletion(weight) {
            if (currentStageIndex < 0 || currentStageIndex >= currentRecipe.stages.length) return;

            const stage = currentRecipe.stages[currentStageIndex];
            const prevAccum = currentStageIndex > 0 ? 
                stageTargets.slice(0, currentStageIndex).reduce((sum, v) => sum + v, 0) : 0;
            const currentStageWater = weight - prevAccum;
            const stageTarget = stageTargets[currentStageIndex] || 0;
            const safeWater = Math.max(0, currentStageWater);
            stageWaterAccum[currentStageIndex] = Math.min(safeWater, stageTarget);

            // 限制提前提示窗口，避免在慢速注水下过早“喊停”导致用户误停
            const stopWindow = Math.max(0, Math.min(Number(stage.stopEarly) || 0, 1));
            const stopAt = Math.max(0, stageTarget - stopWindow);
            if (!stageStopNotified[currentStageIndex] && safeWater >= stopAt && safeWater < stageTarget) {
                stageStopNotified[currentStageIndex] = true;
                beep(800, 150);
                speak('停');
            }

            // 检查是否达到此阶段目标
            if (!stageCompletedFlags[currentStageIndex] && safeWater >= stageTarget) {
                stageCompletedFlags[currentStageIndex] = true;
                updateProgressBar(weight);
                updateUI();
                
                // 如果还有后续阶段，立即进入下一阶段
                if (currentStageIndex < currentRecipe.stages.length - 1) {
                    currentStageIndex++;
                    stageWaterAccum[currentStageIndex] = 0;
                    updateProgressBar(weight);
                    updateUI();
                } else {
                    const fill = document.getElementById('progressBarFill');
                    if (fill) fill.style.width = '100%';
                }
            } else if (!stageCompletedFlags[currentStageIndex]) {
                // 更新当前阶段的累计水量显示
                updateProgressBar(weight);
            }
        }

        // ==================== 操作处理 ====================
        async function handleMainAction() {
            switch (currentState) {
                case STATES.ADD_POWDER:
                    coffeeWeight = currentWeight;
                    if (!currentRecipe || !currentRecipe.stages || currentRecipe.stages.length === 0) {
                        alert('请先选择有效冲煮方案');
                        return;
                    }
                    if (coffeeWeight < 2) {
                        alert('请先加入咖啡粉');
                        return;
                    }
                    stageTargets = computeStageTargets(coffeeWeight);
                    if (!stageTargets.length || stageTargets.some(t => !(t > 0))) {
                        alert('方案参数无效，无法启动冲煮');
                        return;
                    }
                    log('记录粉重:', coffeeWeight, 'g');
                    setState(STATES.CONFIGURED);
                    await sendTare();
                    currentWeight = 0;
                    brewWeightEl.textContent = '0.0';
                    await delay(500);
                    startCountdown();
                    break;

                case STATES.BREWING:
                    if (!stageCompletedFlags.every(Boolean)) {
                        if (!confirm('尚未完成全部注水阶段，确定结束吗？')) return;
                    }
                    await finalizeBrewCompletion();
                    break;

                case STATES.END:
                    resetBrew();
                    await resumeDataNotifications();
                    setState(STATES.WEIGHING);
                    switchToPage('scale');
                    break;
            }
        }

        function renderCompletedSummary() {
            const durationText = timerEl.textContent || '00:00';
            const completedPowderEl = document.getElementById('completedPowder');
            if (completedPowderEl) completedPowderEl.textContent = coffeeWeight.toFixed(1) + 'g';
            completedTimeEl.textContent = durationText;
            completedWaterEl.textContent = finalWaterWeight.toFixed(0) + 'g';
            completedStageList.innerHTML = stageTargets.map((target, i) => {
                const actual = (stageWaterAccum[i] || 0).toFixed(0);
                const targetText = (target || 0).toFixed(0);
                return '<li><span>第' + (i + 1) + '段</span><span>' + actual + ' / ' + targetText + 'g</span></li>';
            }).join('');
        }

        async function finalizeBrewCompletion() {
            finalWaterWeight = Math.max(finalWaterWeight, totalPouredWater, maxRecordedWeight, 0);
            stopRecord();
            stopFlowBeep();
            renderCompletedSummary();
            brewUiFrozen = true;
            await pauseDataNotifications();
            saveHistory();
            setState(STATES.END);
        }

        function startCountdown() {
            if (currentState !== STATES.CONFIGURED) {
                alert('状态未配置完成，无法启动倒计时');
                return;
            }
            countdown = 3;
            setState(STATES.COUNTDOWN);
            speak('3');

            countdownInterval = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    guideText.textContent = '' + countdown;
                    mainBtn.textContent = countdown + '...';
                    speak(countdown.toString());
                } else {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    speak('开始');
                    startBrew();
                }
            }, 1000);
        }

        function startBrew() {
            if (!currentRecipe || !currentRecipe.stages || !stageTargets.length) {
                alert('分段数据未初始化，无法开始冲煮');
                setState(STATES.ADD_POWDER);
                return;
            }
            currentStageIndex = 0;
            stageCompletedFlags = new Array(currentRecipe.stages.length).fill(false);
            stageWaterAccum = new Array(currentRecipe.stages.length).fill(0);
            stageStopNotified = new Array(currentRecipe.stages.length).fill(false);
            recipeConfigured = true;
            brewUiFrozen = false;
            maxRecordedWeight = 0;
            lowWeightCount = 0;
            currentWeight = 0;
            totalPouredWater = 0;

            renderProgressBar();
            resizeCanvas();
            isRecording = true;
            recordStartTime = Date.now();
            weightData = [];

            recordInterval = setInterval(() => {
                updateTimer();
                drawChart();
            }, 100);

            setState(STATES.BREWING);
        }

        function stopRecord() {
            isRecording = false;
            if (recordInterval) { clearInterval(recordInterval); recordInterval = null; }
        }

        function resetBrew() {
            stopRecord();
            stopFlowBeep();
            if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
            countdown = 0;
            weightData = [];
            smoothFlow = 0;
            lastWeight = 0;
            lastTime = 0;
            maxRecordedWeight = 0;
            lowWeightCount = 0;
            finalWaterWeight = 0;
            currentStageIndex = -1;
            stageCompletedFlags = [];
            stageWaterAccum = [];
            stageTargets = [];
            stageStopNotified = [];
            recipeConfigured = false;
            totalPouredWater = 0;
            brewUiFrozen = false;
            coffeeWeight = 0;
            timerEl.textContent = '00:00';
            flowEl.textContent = '0.0';
            flowStatus.textContent = '';
            flowStatus.className = 'flow-status';
            weightStatus.innerHTML = '<span>--</span>';
            completedPanel.style.display = 'none';
            completedTimeEl.textContent = '00:00';
            completedWaterEl.textContent = '0g';
            completedStageList.innerHTML = '';
            lastFlowStatus = null;
            currentBeepType = null;
            drawChart();
        }

        async function sendTare() {
            if (!ctrlChar) return;
            try {
                await ctrlChar.writeValueWithoutResponse(TARE_CMD);
            } catch (e) {
                console.error('去皮失败', e);
            }
        }

        async function handleTareAction() {
            if (currentState === STATES.ADD_POWDER) {
                resetBrew();
                setState(STATES.WEIGHING);
                switchToPage('scale');
                return;
            }

            if (currentState === STATES.END) {
                resetBrew();
                await resumeDataNotifications();
                enterBrewMode();
            }
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - recordStartTime) / 1000);
            const m = Math.floor(elapsed / 60);
            const s = elapsed % 60;
            timerEl.textContent = m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0');
        }

        function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

        // ==================== 曲线绘制 ====================
        function drawChart() {
            const w = canvas.width;
            const h = canvas.height;

            ctx.fillStyle = '#0d0d0d';
            ctx.fillRect(0, 0, w, h);

            ctx.fillStyle = '#444';
            ctx.font = '9px sans-serif';
            ctx.textAlign = 'center';

            const maxTime = weightData.length > 0 ? Math.max(...weightData.map(d => d.time), 180) : 180;

            for (let t = 0; t <= maxTime; t += 30) {
                const x = (t / maxTime) * w;
                ctx.fillText(formatTime(t), x, h - 2);
            }

            if (weightData.length < 2) return;

            const weights = weightData.map(d => d.weight);
            const maxW = Math.max(...weights, 100);
            const minW = Math.min(...weights, 0);
            const rangeW = maxW - minW + 20;

            ctx.strokeStyle = '#4ade80';
            ctx.lineWidth = 2;
            ctx.beginPath();
            weightData.forEach((d, i) => {
                const x = (d.time / maxTime) * w;
                const y = h - ((d.weight - minW + 10) / rangeW) * (h - 16) * 0.9 - 14;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            if (m > 0) return m + "'" + s.toString().padStart(2, '0');
            return s + 's';
        }

        // ==================== 语音和声音 ====================
        let audioCtx = null;

        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'zh-CN';
                u.rate = 1.2;
                speechSynthesis.speak(u);
            }
        }

        function beep(frequency, duration, type) {
            type = type || 'sine';
            const c = getAudioCtx();
            const osc = c.createOscillator();
            const gain = c.createGain();
            osc.connect(gain);
            gain.connect(c.destination);
            osc.frequency.value = frequency;
            osc.type = type;
            gain.gain.setValueAtTime(0.3, c.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, c.currentTime + duration / 1000);
            osc.start(c.currentTime);
            osc.stop(c.currentTime + duration / 1000);
        }

        // ==================== 历史 ====================
        function saveHistory() {
            const fw = Math.max(finalWaterWeight, maxRecordedWeight, currentWeight, 0);
            const record = {
                id: Date.now(),
                date: new Date().toISOString(),
                recipe: currentRecipe ? currentRecipe.name : '',
                coffeeWeight,
                maxWeight: fw,
                duration: weightData.length > 0 ? weightData[weightData.length - 1].time : 0,
                data: [...weightData]
            };
            history.unshift(record);
            if (history.length > 30) history.pop();
            localStorage.setItem('brewHistory', JSON.stringify(history));
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (history.length === 0) {
                list.innerHTML = '<p style="color:#555;text-align:center;padding:40px;">暂无冲煮记录</p>';
                return;
            }
            list.innerHTML = history.map((r, i) => {
                const cw = (Number(r.coffeeWeight) || 0).toFixed(1);
                const mw = (Number(r.maxWeight) || 0).toFixed(0);
                const dur = formatDuration(Number(r.duration) || 0);
                const typeLabel = r.type === 'espresso' ? '☕ ' : '';
                return '<div class="history-item" onclick="showHistoryDetail(' + i + ')">' +
                    '<div class="history-header">' +
                    '<span class="history-recipe">' + typeLabel + (r.recipe || '自定义冲煮') + '</span>' +
                    '<span class="history-time">' + formatHistoryTime(r.date) + '</span></div>' +
                    '<div class="history-summary">' +
                    (r.type !== 'espresso' ? '<span>\u7C89\u91CD <span class="value">' + cw + 'g</span></span>' : '') +
                    '<span>\u6DB2\u91CD <span class="value">' + mw + 'g</span></span>' +
                    '<span>\u65F6\u957F <span class="value">' + dur + '</span></span>' +
                    '</div></div>';
            }).join('');
        }

        function formatHistoryTime(dateStr) {
            const d = new Date(dateStr);
            const diff = Date.now() - d;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 172800000) return '昨天';
            return d.toLocaleDateString();
        }

        function formatDuration(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + s.toString().padStart(2, '0');
        }

        function showHistoryDetail(index) {
            currentHistoryIndex = index;
            const r = history[index];
            if (!r) return;

            document.getElementById('historyDetailTitle').textContent = r.recipe || '冲煮详情';

            let avgFlow = 0;
            if (r.data && r.data.length > 0) {
                const flows = r.data.filter(d => d.flow > 0).map(d => d.flow);
                avgFlow = flows.length > 0 ? flows.reduce((a, b) => a + b, 0) / flows.length : 0;
            }

            const cw = (Number(r.coffeeWeight) || 0).toFixed(1);
            const mw = (Number(r.maxWeight) || 0).toFixed(1);
            const dur = formatDuration(Number(r.duration) || 0);

            let statsHTML = '';
            if (r.type !== 'espresso') {
                statsHTML += '<div class="detail-stat"><div class="detail-stat-label">\u5496\u5561\u7C89\u91CD</div><div class="detail-stat-value green">' + cw + 'g</div></div>';
            }
            statsHTML += '<div class="detail-stat"><div class="detail-stat-label">\u51FA\u6DB2\u91CD\u91CF</div><div class="detail-stat-value">' + mw + 'g</div></div>';
            statsHTML += '<div class="detail-stat"><div class="detail-stat-label">\u65F6\u957F</div><div class="detail-stat-value">' + dur + '</div></div>';
            if (r.type !== 'espresso') {
                statsHTML += '<div class="detail-stat"><div class="detail-stat-label">\u5E73\u5747\u6D41\u901F</div><div class="detail-stat-value">' + avgFlow.toFixed(1) + 'g/s</div></div>';
            }

            document.getElementById('historyDetailStats').innerHTML = statsHTML;
            drawHistoryChart(r.data || []);
            document.getElementById('historyDetailModal').classList.add('show');
        }

        function closeHistoryDetail() {
            document.getElementById('historyDetailModal').classList.remove('show');
        }

        function deleteHistoryRecord() {
            if (currentHistoryIndex < 0 || currentHistoryIndex >= history.length) return;
            if (!confirm('确定删除此记录？')) return;
            history.splice(currentHistoryIndex, 1);
            localStorage.setItem('brewHistory', JSON.stringify(history));
            closeHistoryDetail();
            renderHistory();
        }

        function clearAllHistory() {
            if (history.length === 0) return;
            if (!confirm('确定清空所有历史记录？')) return;
            history = [];
            localStorage.setItem('brewHistory', JSON.stringify(history));
            renderHistory();
        }

        function drawHistoryChart(data) {
            const c = historyCanvas;
            const cx = historyCtx;
            const rect = c.parentElement.getBoundingClientRect();
            c.width = rect.width - 16;
            c.height = 120;

            const w = c.width, h = c.height;
            cx.fillStyle = '#0d0d0d';
            cx.fillRect(0, 0, w, h);

            if (data.length < 2) {
                cx.fillStyle = '#555';
                cx.font = '12px sans-serif';
                cx.textAlign = 'center';
                cx.fillText('无数据', w / 2, h / 2);
                return;
            }

            cx.fillStyle = '#444';
            cx.font = '9px sans-serif';
            cx.textAlign = 'center';

            const maxTime = Math.max(...data.map(d => d.time), 60);
            for (let t = 0; t <= maxTime; t += 30) {
                const x = (t / maxTime) * w;
                cx.fillText(formatTime(t), x, h - 2);
            }

            const weights = data.map(d => d.weight);
            const maxW = Math.max(...weights, 100);
            const minW = Math.min(...weights, 0);
            const rangeW = maxW - minW + 20;

            cx.strokeStyle = '#4ade80';
            cx.lineWidth = 2;
            cx.beginPath();
            data.forEach((d, i) => {
                const x = (d.time / maxTime) * w;
                const y = h - ((d.weight - minW + 10) / rangeW) * (h - 16) * 0.9 - 14;
                i === 0 ? cx.moveTo(x, y) : cx.lineTo(x, y);
            });
            cx.stroke();
        }

        // 弹窗外部点击关闭
        document.getElementById('editorModal').addEventListener('click', function(e) { if (e.target === this) closeEditor(); });
        document.getElementById('historyDetailModal').addEventListener('click', function(e) { if (e.target === this) closeHistoryDetail(); });

        // ==================== 意式咖啡（简化版） ====================
        let espressoCountdown = 0;
        let espressoCountdownInterval = null;

        function updateEspressoUI() {
            const espressoTareBtn = document.getElementById('espressoTareBtn');
            const espressoMainBtn = document.getElementById('espressoMainBtn');
            const espressoGuideIcon = document.getElementById('espressoGuideIcon');
            const espressoGuideText = document.getElementById('espressoGuideText');
            const espressoGuideSub = document.getElementById('espressoGuideSub');
            const espressoTimerSection = document.getElementById('espressoTimerSection');
            const espressoWeightStatus = document.getElementById('espressoWeightStatus');

            switch (espressoState) {
                case ESPRESSO_STATES.IDLE:
                    espressoGuideIcon.textContent = '☕';
                    espressoGuideText.textContent = '意式浓缩';
                    espressoGuideSub.textContent = '按下开始，记录萃取时长和出液重量';
                    espressoTimerSection.style.display = 'none';
                    espressoTareBtn.disabled = !connected;
                    espressoMainBtn.disabled = !connected;
                    espressoMainBtn.textContent = '开始萃取';
                    espressoWeightStatus.innerHTML = '<span>--</span>';
                    break;

                case ESPRESSO_STATES.COUNTDOWN:
                    espressoGuideIcon.textContent = '⏱️';
                    espressoGuideText.textContent = '' + espressoCountdown;
                    espressoGuideSub.textContent = '';
                    espressoTimerSection.style.display = 'none';
                    espressoTareBtn.disabled = true;
                    espressoMainBtn.disabled = true;
                    espressoMainBtn.textContent = espressoCountdown + '...';
                    break;

                case ESPRESSO_STATES.BREWING:
                    espressoGuideIcon.textContent = '💧';
                    espressoGuideText.textContent = '萃取中';
                    espressoGuideSub.textContent = '';
                    espressoTimerSection.style.display = 'block';
                    espressoTareBtn.disabled = true;
                    espressoMainBtn.disabled = false;
                    espressoMainBtn.textContent = '结束萃取';
                    break;

                case ESPRESSO_STATES.END:
                    espressoGuideIcon.textContent = '🎉';
                    espressoGuideText.textContent = '萃取完成！';
                    espressoGuideSub.textContent = '\u6DB2\u91CD: ' + espressoFinalWeight.toFixed(1) + 'g \xB7 \u65F6\u957F: ' + espressoFinalTime.toFixed(1) + 's';
                    espressoTimerSection.style.display = 'block';
                    espressoTareBtn.disabled = true;
                    espressoMainBtn.disabled = false;
                    espressoMainBtn.textContent = '返回';
                    espressoWeightStatus.innerHTML = '<span style="color:#f59e0b">\u8403\u53D6\u5B8C\u6210 ' + espressoFinalWeight.toFixed(1) + 'g</span>';
                    break;
            }
        }

        async function handleEspressoAction() {
            switch (espressoState) {
                case ESPRESSO_STATES.IDLE:
                    await sendTare();
                    startEspressoCountdown();
                    break;
                case ESPRESSO_STATES.BREWING:
                    endEspresso();
                    break;
                case ESPRESSO_STATES.END:
                    resetEspresso();
                    break;
            }
        }

        function startEspressoCountdown() {
            espressoCountdown = 3;
            espressoState = ESPRESSO_STATES.COUNTDOWN;
            updateEspressoUI();
            speak('3');

            espressoCountdownInterval = setInterval(() => {
                espressoCountdown--;
                if (espressoCountdown > 0) {
                    document.getElementById('espressoGuideText').textContent = '' + espressoCountdown;
                    document.getElementById('espressoMainBtn').textContent = espressoCountdown + '...';
                    speak(espressoCountdown.toString());
                } else {
                    clearInterval(espressoCountdownInterval);
                    espressoCountdownInterval = null;
                    // 倒计时结束：先立即开启萃取（确保计时与称重并行启动），再播放提示音
                    startEspresso();
                    speak('开始');
                }
            }, 1000);
        }

        function startEspresso() {
            espressoState = ESPRESSO_STATES.BREWING;
            // 立即记录开始时间，确保计时器与重量回调以此时间为准
            espressoStartTime = Date.now();
            espressoStableWeight = -999; // 初始化为无效值，避免0g时误判稳定
            espressoStableTime = 0;
            espressoLastSignificantChangeTime = espressoStartTime;
            espressoLastSignificantWeight = currentWeight || 0;
            espressoFinalWeight = 0;
            updateEspressoUI();

            espressoInterval = setInterval(() => {
                const elapsed = (Date.now() - espressoStartTime) / 1000;
                // 计时器从0开始显示，不扣预浸泡时间
                document.getElementById('espressoTimer').textContent = elapsed.toFixed(1);
            }, 100);
        }

        function endEspresso(endTime) {
            if (espressoInterval) { clearInterval(espressoInterval); espressoInterval = null; }
            espressoFinalWeight = currentWeight;
            // 如果自动结束，传入的是最后一次显著变化的时间；手动结束使用当前时间
            const actualEndTime = endTime || Date.now();
            // 最终萃取时长取稳定开始时刻（不包含后续3秒确认等待）
            espressoFinalTime = Math.max(0, (actualEndTime - espressoStartTime) / 1000);
            document.getElementById('espressoTimer').textContent = espressoFinalTime.toFixed(1);
            espressoState = ESPRESSO_STATES.END;
            beep(800, 200);
            speak('完成');
            updateEspressoUI();
            saveEspressoHistory();
        }

        function resetEspresso() {
            if (espressoInterval) { clearInterval(espressoInterval); espressoInterval = null; }
            // 修复：断开连接时也清除倒计时
            if (espressoCountdownInterval) { clearInterval(espressoCountdownInterval); espressoCountdownInterval = null; }
            espressoState = ESPRESSO_STATES.IDLE;
            espressoStableWeight = -999;
            espressoStableTime = 0;
            espressoLastSignificantChangeTime = 0;
            espressoLastSignificantWeight = 0;
            espressoFinalWeight = 0;
            espressoFinalTime = 0;
            document.getElementById('espressoWeight').textContent = '0.0';
            document.getElementById('espressoTimer').textContent = '00.0';
            updateEspressoUI();
        }

        function saveEspressoHistory() {
            const record = {
                id: Date.now(),
                date: new Date().toISOString(),
                recipe: '意式浓缩',
                type: 'espresso',
                coffeeWeight: 0,
                maxWeight: espressoFinalWeight,
                duration: espressoFinalTime
            };
            history.unshift(record);
            if (history.length > 30) history.pop();
            localStorage.setItem('brewHistory', JSON.stringify(history));
        }

        // 修复：意式咖啡稳定检测加入最低重量阈值
        function checkEspressoStable(weight) {
            if (espressoState !== ESPRESSO_STATES.BREWING) return;
            // 至少要有2g液重才开始检测稳定性，避免空杯时误判
            if (weight < 2) return;

            const now = Date.now();

            // 判断是否为显著变化（超过阈值）
            if (Math.abs(weight - espressoLastSignificantWeight) > STABLE_THRESHOLD) {
                // 出现显著变化，更新最后一次显著变化时间和参考重量
                espressoLastSignificantChangeTime = now;
                espressoLastSignificantWeight = weight;
                return;
            }

            // 非显著变化：如果自上次显著变化后已经持续稳定超过确认时间，则结束萃取
            if (espressoLastSignificantChangeTime > 0 && (now - espressoLastSignificantChangeTime) >= STABLE_CONFIRM_MS) {
                // 使用最后一次显著变化的时间作为稳定开始时间（即萃取时长的结束时刻）
                endEspresso(espressoLastSignificantChangeTime);
            }
        }

        // ==================== 启动 ====================
        init();
    </script>
</body>
</html>
