<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>手冲咖啡助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* 页面容器 */
        .page {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .page.active {
            display: flex;
        }

        /* 顶部状态栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
        }

        .device-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
            transition: all 0.3s;
        }

        .status-dot.connected {
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80;
        }

        .status-dot.connecting {
            background: #f59e0b;
            animation: pulse-dot 1s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .device-name {
            font-size: 13px;
            color: #888;
        }

        .state-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 8px;
            background: #2a2a2a;
            color: #666;
        }

        .state-badge.brewing { background: #3a2a1a; color: #f59e0b; }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #2a2a2a;
            border: none;
            color: #888;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* 主内容区 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 10px;
            padding-bottom: 70px;
        }

        /* 方案选择区 */
        .recipe-section {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .recipe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .recipe-name {
            font-size: 15px;
            font-weight: 500;
            color: #4ade80;
        }

        .recipe-ratio {
            font-size: 12px;
            color: #666;
        }

        .recipe-stages {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .stage-tag {
            background: #2a2a2a;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #888;
        }

        .stage-tag.active {
            background: #1a3a1a;
            color: #4ade80;
        }

        /* 主引导区 */
        .guide-section {
            background: linear-gradient(135deg, #1a2a1a 0%, #1a1a1a 100%);
            border: 1px solid #2a3a2a;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            text-align: center;
        }

        .guide-row {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .guide-icon {
            font-size: 18px;
            margin-right: 6px;
        }

        .guide-text {
            font-size: 15px;
            font-weight: 500;
            color: #4ade80;
        }

        .guide-sub {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        /* 重量显示区 */
        .weight-display {
            text-align: center;
            padding: 8px 0;
        }

        .weight-row {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 4px;
        }

        .weight-value {
            font-size: 52px;
            font-weight: 200;
            font-family: 'SF Mono', 'Courier New', monospace;
            color: #fff;
            line-height: 1;
        }

        .weight-value.negative {
            color: #f87171;
        }

        .weight-unit {
            font-size: 20px;
            color: #666;
        }

        .weight-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 4px;
            font-size: 12px;
            color: #666;
        }

        /* 分段进度 */
        .stages-section {
            margin: 8px 0;
        }

        .stages-track {
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        .stage-node {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .stage-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #555;
            margin-bottom: 4px;
            transition: all 0.3s;
        }

        .stage-circle.completed {
            background: #1a3a1a;
            border-color: #4ade80;
            color: #4ade80;
        }

        .stage-circle.active {
            background: #2a3a1a;
            border-color: #4ade80;
            color: #4ade80;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
        }

        .stage-label {
            font-size: 9px;
            color: #555;
        }

        .stage-connector {
            flex: 0.5;
            height: 3px;
            background: #333;
            margin-bottom: 16px;
            position: relative;
            border-radius: 2px;
            overflow: hidden;
        }

        .stage-connector.completed {
            background: #4ade80;
        }

        .stage-connector-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: #4ade80;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* 时间和流速 */
        .metrics {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 8px 0;
        }

        .metric {
            text-align: center;
        }

        .metric-label {
            font-size: 11px;
            color: #555;
            margin-bottom: 2px;
        }

        .metric-value {
            font-size: 22px;
            font-family: 'SF Mono', 'Courier New', monospace;
            color: #f59e0b;
        }

        .metric-unit {
            font-size: 10px;
            color: #555;
        }

        .flow-status {
            font-size: 10px;
            margin-top: 2px;
            padding: 1px 6px;
            border-radius: 6px;
            display: inline-block;
        }

        .flow-status.low { background: #1a2a3a; color: #60a5fa; }
        .flow-status.normal { background: #1a3a1a; color: #4ade80; }
        .flow-status.high { background: #3a2a1a; color: #f59e0b; }
        .flow-status.danger { background: #3a1a1a; color: #f87171; }

        /* 曲线图 */
        .chart-container {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 8px;
            margin: 8px 0;
        }

        .chart-title {
            font-size: 11px;
            color: #555;
            margin-bottom: 4px;
        }

        #chart {
            width: 100%;
            height: 80px;
            display: block;
        }

        /* 操作按钮 */
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-tare {
            background: #2a2a2a;
            color: #888;
        }

        .btn-primary {
            background: #4ade80;
            color: #000;
            font-weight: 600;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 底部导航栏 */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            padding: 8px 0;
            z-index: 50;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 0;
            color: #666;
            font-size: 10px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: #4ade80;
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }

        /* 方案页面 */
        .recipe-page-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            padding-bottom: 70px;
        }

        .recipe-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .recipe-item {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .recipe-item.selected {
            border-color: #4ade80;
        }

        .recipe-item-name {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 4px;
        }

        .recipe-item-info {
            font-size: 11px;
            color: #666;
        }

        .recipe-item-stages {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .recipe-item-stage {
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            color: #888;
        }

        .recipe-item-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .recipe-item-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #0d0d0d;
            color: #888;
            font-size: 12px;
            cursor: pointer;
        }

        .recipe-item-btn.primary {
            background: #4ade80;
            color: #000;
            border: none;
        }

        /* 方案编辑表单 */
        .form-group {
            margin-bottom: 12px;
        }

        .form-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
            display: block;
        }

        .form-input {
            width: 100%;
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: #4ade80;
        }

        .stage-config {
            background: #0d0d0d;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
        }

        .stage-config-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .stage-config-title {
            font-size: 13px;
            color: #4ade80;
        }

        .stage-config-row {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
        }

        .stage-config-field {
            flex: 1;
        }

        .stage-config-field label {
            font-size: 10px;
            color: #666;
            display: block;
            margin-bottom: 2px;
        }

        .stage-config-field input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 8px;
            color: #fff;
            font-size: 13px;
        }

        .btn-add-stage {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed #333;
            background: transparent;
            color: #666;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn-save {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: #4ade80;
            color: #000;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        .btn-delete {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #f87171;
            background: transparent;
            color: #f87171;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
        }

        /* 导出页面 */
        .export-page-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            padding-bottom: 70px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:active {
            background: #222;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .history-recipe {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
        }

        .history-time {
            font-size: 11px;
            color: #666;
        }

        .history-summary {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #888;
        }

        .history-summary span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .history-summary .value {
            color: #f59e0b;
            font-weight: 500;
        }

        /* 历史详情 */
        .history-detail-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .detail-stat {
            background: #0d0d0d;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .detail-stat-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
        }

        .detail-stat-value {
            font-size: 18px;
            font-weight: 600;
            color: #f59e0b;
        }

        .detail-stat-value.green {
            color: #4ade80;
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 16px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 22px;
            cursor: pointer;
        }

        .btn-connect {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: #2a2a2a;
            color: #888;
        }

        .btn-connect.connected {
            background: #1a1a1a;
            color: #4ade80;
            border: 1px solid #4ade80;
        }
    </style>
</head>
<body>
    <!-- 主页面 - 冲煮 -->
    <div class="page active" id="brewPage">
        <!-- 顶部状态栏 -->
        <div class="header">
            <div class="device-status">
                <div class="status-dot" id="statusDot"></div>
                <span class="device-name" id="deviceName">未连接</span>
                <span class="state-badge" id="stateBadge">称重</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="showExportModal()">↓</button>
            </div>
        </div>

        <!-- 主内容 -->
        <div class="main">
            <!-- 方案选择区 -->
            <div class="recipe-section" id="recipeSection" style="display:none;">
                <div class="recipe-header">
                    <span class="recipe-name" id="recipeName">标准三段式</span>
                    <span class="recipe-ratio" id="recipeRatio">粉水比 1:15</span>
                </div>
                <div class="recipe-stages" id="recipeStages"></div>
            </div>

            <!-- 主引导区 -->
            <div class="guide-section">
                <div class="guide-row">
                    <span class="guide-icon" id="guideIcon">⚖️</span>
                    <span class="guide-text" id="guideText">称重模式</span>
                </div>
                <div class="guide-sub" id="guideSub">点击"手冲咖啡"开始</div>
            </div>

            <!-- 重量显示 -->
            <div class="weight-display">
                <div class="weight-row">
                    <span class="weight-value" id="weight">0.0</span>
                    <span class="weight-unit">g</span>
                </div>
                <div class="weight-status" id="weightStatus">
                    <span>--</span>
                </div>
            </div>

            <!-- 分段进度 -->
            <div class="stages-section" id="stagesSection" style="display:none;">
                <div class="stages-track" id="stagesTrack"></div>
            </div>

            <!-- 时间和流速 -->
            <div class="metrics" id="metricsSection" style="display:none;">
                <div class="metric">
                    <div class="metric-label">计时</div>
                    <div><span class="metric-value" id="timer">00:00</span></div>
                </div>
                <div class="metric">
                    <div class="metric-label">流速</div>
                    <div>
                        <span class="metric-value" id="flowRate">0.0</span>
                        <span class="metric-unit">g/s</span>
                    </div>
                    <div class="flow-status" id="flowStatus"></div>
                </div>
            </div>

            <!-- 曲线图 -->
            <div class="chart-container" id="chartSection" style="display:none;">
                <div class="chart-title">注水曲线</div>
                <canvas id="chart"></canvas>
            </div>

            <!-- 操作按钮 -->
            <div class="actions" id="actionsSection">
                <button class="btn btn-tare" id="tareBtn" onclick="handleTareAction()" disabled>去皮</button>
                <button class="btn btn-primary" id="mainBtn" onclick="handleMainAction()" disabled>手冲咖啡</button>
            </div>
        </div>

        <!-- 底部连接栏 -->
        <div style="position: fixed; bottom: 56px; left: 0; right: 0; padding: 12px; background: linear-gradient(to top, #0d0d0d 80%, transparent);">
            <button class="btn-connect" id="connectBtn" onclick="connect()">连接电子秤</button>
        </div>
    </div>

    <!-- 方案页面 -->
    <div class="page" id="recipePage">
        <div class="header">
            <span class="header-title">冲煮方案</span>
            <button class="icon-btn" onclick="showRecipeEditor(null)">+</button>
        </div>
        <div class="recipe-page-content">
            <div class="recipe-list" id="recipePageList"></div>
        </div>
    </div>

    <!-- 历史页面 -->
    <div class="page" id="historyPage">
        <div class="header">
            <span class="header-title">冲煮历史</span>
        </div>
        <div class="export-page-content">
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <!-- 历史详情弹窗 -->
    <div class="modal" id="historyDetailModal">
        <div class="modal-content" style="max-height: 90vh;">
            <div class="modal-header">
                <span class="modal-title" id="historyDetailTitle">冲煮详情</span>
                <button class="modal-close" onclick="closeHistoryDetail()">×</button>
            </div>
            <div id="historyDetailContent">
                <div class="history-detail-stats" id="historyDetailStats"></div>
                <div class="chart-container" style="margin-top: 12px;">
                    <div class="chart-title">注水曲线</div>
                    <canvas id="historyChart"></canvas>
                </div>
            </div>
            <button class="btn-delete" style="margin-top: 16px;" onclick="deleteHistoryRecord()">删除此记录</button>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <div class="nav-bar">
        <div class="nav-item active" id="navBrew" onclick="switchPage('brew')">
            <span class="nav-icon">☕</span>
            <span>冲煮</span>
        </div>
        <div class="nav-item" id="navRecipe" onclick="switchPage('recipe')">
            <span class="nav-icon">📋</span>
            <span>方案</span>
        </div>
        <div class="nav-item" id="navHistory" onclick="switchPage('history')">
            <span class="nav-icon">📜</span>
            <span>历史</span>
        </div>
    </div>

    <!-- 方案编辑弹窗 -->
    <div class="modal" id="editorModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="editorTitle">新建方案</span>
                <button class="modal-close" onclick="closeEditor()">×</button>
            </div>
            <div class="form-group">
                <label class="form-label">方案名称</label>
                <input class="form-input" type="text" id="editName" placeholder="如：标准三段式">
            </div>
            <div class="form-group">
                <label class="form-label">粉水比（如 1:15）</label>
                <input class="form-input" type="text" id="editRatio" value="1:15">
            </div>
            <div class="form-group">
                <label class="form-label">咖啡粉重（g）- 用于计算目标水量</label>
                <input class="form-input" type="number" id="editCoffeeWeight" value="15">
            </div>
            <div class="form-group">
                <label class="form-label">注水阶段（目标水量 = 粉重 × 倍数）</label>
                <div id="stageEditorList"></div>
                <button class="btn-add-stage" onclick="addStage()">+ 添加阶段</button>
            </div>
            <button class="btn-save" onclick="saveRecipe()">保存方案</button>
            <button class="btn-delete" id="deleteRecipeBtn" style="display:none;" onclick="deleteRecipe()">删除方案</button>
        </div>
    </div>

    <script>
        // ==================== 调试配置 ====================
        const DEBUG = false;
        const log = (...args) => { if (DEBUG) console.log(...args); };

        // ==================== 蓝牙配置 ====================
        const SERVICE_UUID = 0xFFF0;
        const DATA_CHAR_UUID = 0xFFF1;
        const CTRL_CHAR_UUID = 0xFFF2;
        const TARE_CMD = new Uint8Array([0xA5, 0x5A, 0x03, 0x0D, 0x00, 0x02, 0x00, 0x00, 0x00, 0x71]);

        // ==================== 状态机 ====================
        const STATES = {
            IDLE: 'idle',
            WEIGHING: 'weighing',
            ADD_POWDER: 'addPowder',
            COUNTDOWN: 'countdown',
            BREWING: 'brewing',
            END: 'end'
        };

        const STATE_LABELS = {
            [STATES.IDLE]: 'Idle',
            [STATES.WEIGHING]: '称重',
            [STATES.ADD_POWDER]: '加粉',
            [STATES.COUNTDOWN]: '倒计时',
            [STATES.BREWING]: '冲煮',
            [STATES.END]: '完成'
        };

        // ==================== 全局变量 ====================
        let device = null, server = null, dataChar = null, ctrlChar = null;
        let connected = false;
        let currentState = STATES.IDLE;

        let currentWeight = 0;
        let lastWeight = 0;
        let lastTime = 0;
        let smoothFlow = 0;
        let coffeeWeight = 0;

        let isRecording = false;
        let recordStartTime = 0;
        let recordInterval = null;
        let weightData = [];
        let maxRecordedWeight = 0;
        let lowWeightCount = 0;
        let finalWaterWeight = 0;

        let countdown = 0;
        let countdownInterval = null;

        // 当前方案
        let currentRecipe = null;
        let currentStageIndex = -1;
        let stageCompletedFlags = [];

        // 方案列表
        let recipes = [];
        let editingRecipeId = null;

        // 历史记录
        let history = JSON.parse(localStorage.getItem('brewHistory') || '[]');
        let currentHistoryIndex = -1;

        // ==================== 默认方案 ====================
        const DEFAULT_RECIPES = [
            {
                id: 'three-stage',
                name: '标准三段式',
                ratio: '1:15',
                defaultCoffeeWeight: 15,
                stages: [
                    { multiplier: 3, targetFlow: 4, stopEarly: 4 },
                    { multiplier: 11, targetFlow: 4, stopEarly: 4 },
                    { multiplier: 15, targetFlow: 4, stopEarly: 4 }
                ]
            },
            {
                id: 'one-pour',
                name: '一刀流',
                ratio: '1:15',
                defaultCoffeeWeight: 15,
                stages: [
                    { multiplier: 15, targetFlow: 4, stopEarly: 4 }
                ]
            },
            {
                id: 'two-stage',
                name: '两段式',
                ratio: '1:15',
                defaultCoffeeWeight: 15,
                stages: [
                    { multiplier: 7.5, targetFlow: 4, stopEarly: 4 },
                    { multiplier: 15, targetFlow: 4, stopEarly: 4 }
                ]
            }
        ];

        function cloneDefaults() {
            try {
                if (typeof structuredClone === 'function') {
                    return structuredClone(DEFAULT_RECIPES);
                }
            } catch (e) {}
            return JSON.parse(JSON.stringify(DEFAULT_RECIPES));
        }

        // ==================== DOM 元素 ====================
        const weightEl = document.getElementById('weight');
        const flowEl = document.getElementById('flowRate');
        const timerEl = document.getElementById('timer');
        const statusDot = document.getElementById('statusDot');
        const deviceName = document.getElementById('deviceName');
        const stateBadge = document.getElementById('stateBadge');
        const connectBtn = document.getElementById('connectBtn');
        const mainBtn = document.getElementById('mainBtn');
        const tareBtn = document.getElementById('tareBtn');
        const guideIcon = document.getElementById('guideIcon');
        const guideText = document.getElementById('guideText');
        const guideSub = document.getElementById('guideSub');
        const weightStatus = document.getElementById('weightStatus');
        const flowStatus = document.getElementById('flowStatus');
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const historyCanvas = document.getElementById('historyChart');
        const historyCtx = historyCanvas.getContext('2d');

        // ==================== 初始化 ====================
        function init() {
            loadRecipes();
            selectRecipe(recipes[0]);
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            renderHistory();
            renderRecipePageList();
        }

        // ==================== 页面切换 ====================
        function switchPage(page) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            // 显示目标页面
            switch(page) {
                case 'brew':
                    document.getElementById('brewPage').classList.add('active');
                    document.getElementById('navBrew').classList.add('active');
                    break;
                case 'recipe':
                    document.getElementById('recipePage').classList.add('active');
                    document.getElementById('navRecipe').classList.add('active');
                    renderRecipePageList();
                    break;
                case 'history':
                    document.getElementById('historyPage').classList.add('active');
                    document.getElementById('navHistory').classList.add('active');
                    renderHistory();
                    break;
            }
        }

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 16;
            canvas.height = 80;
            drawChart();
        }

        // ==================== 方案管理 ====================
        function loadRecipes() {
            const saved = localStorage.getItem('brewRecipes');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (!Array.isArray(parsed)) throw new Error('Invalid recipe format');
                    // 验证方案格式是否正确（检查是否有multiplier字段）
                    const valid = parsed.every(r =>
                        r.stages && r.stages.every(s => typeof s.multiplier === 'number')
                    );
                    if (valid) {
                        recipes = parsed;
                    } else {
                        // 格式不正确，使用默认方案
                        localStorage.removeItem('brewRecipes');
                        recipes = cloneDefaults();
                        saveRecipes();
                    }
                } catch (e) {
                    localStorage.removeItem('brewRecipes');
                    recipes = cloneDefaults();
                    saveRecipes();
                }
            } else {
                recipes = cloneDefaults();
                saveRecipes();
            }
        }

        function saveRecipes() {
            localStorage.setItem('brewRecipes', JSON.stringify(recipes));
        }

        function selectRecipe(recipe) {
            currentRecipe = recipe;
            document.getElementById('recipeName').textContent = recipe.name;
            document.getElementById('recipeRatio').textContent = `粉水比 ${recipe.ratio}`;

            // 渲染阶段标签
            const stagesEl = document.getElementById('recipeStages');
            stagesEl.innerHTML = recipe.stages.map((s, i) =>
                `<span class="stage-tag" id="stageTag${i}">${s.multiplier}倍</span>`
            ).join('');

            // 更新方案页面的选中状态
            renderRecipePageList();
        }

        // 加粉阶段更新方案显示
        function updateAddPowderRecipe(coffeeWeight) {
            if (!currentRecipe) return;

            const stagesEl = document.getElementById('recipeStages');
            stagesEl.innerHTML = currentRecipe.stages.map((s, i) => {
                const targetWater = coffeeWeight * s.multiplier;
                return `<span class="stage-tag" id="stageTag${i}">${s.multiplier}倍 = ${targetWater.toFixed(0)}g</span>`;
            }).join('');
        }

        // 方案页面的列表渲染
        function renderRecipePageList() {
            const list = document.getElementById('recipePageList');
            list.innerHTML = recipes.map(r => `
                <div class="recipe-item ${currentRecipe && currentRecipe.id === r.id ? 'selected' : ''}" onclick="selectRecipeFromPage('${r.id}')">
                    <div class="recipe-item-name">${r.name}</div>
                    <div class="recipe-item-info">粉水比 ${r.ratio} · ${r.stages.length}段注水</div>
                    <div class="recipe-item-stages">
                        ${r.stages.map(s => `<span class="recipe-item-stage">${s.multiplier}倍</span>`).join('')}
                    </div>
                    <div class="recipe-item-actions">
                        <button class="recipe-item-btn primary" onclick="event.stopPropagation(); selectRecipeFromPage('${r.id}')">选用</button>
                        <button class="recipe-item-btn" onclick="event.stopPropagation(); showRecipeEditor('${r.id}')">编辑</button>
                    </div>
                </div>
            `).join('');
        }

        function selectRecipeFromPage(id) {
            const recipe = recipes.find(r => r.id === id);
            if (recipe) {
                selectRecipe(recipe);
                switchPage('brew');
            }
        }

        function showExportModal() {
            switchPage('history');
        }

        function showRecipeEditor(id) {
            editingRecipeId = id;
            const recipe = id ? recipes.find(r => r.id === id) : null;

            document.getElementById('editorTitle').textContent = recipe ? '编辑方案' : '新建方案';
            document.getElementById('editName').value = recipe ? recipe.name : '';
            document.getElementById('editRatio').value = recipe ? recipe.ratio : '1:15';
            document.getElementById('editCoffeeWeight').value = recipe ? recipe.defaultCoffeeWeight : 15;
            document.getElementById('deleteRecipeBtn').style.display = recipe && !DEFAULT_RECIPES.find(d => d.id === recipe.id) ? 'block' : 'none';

            renderStageEditor(recipe ? recipe.stages : [{ multiplier: 15, targetFlow: 4, stopEarly: 4 }]);
            document.getElementById('editorModal').classList.add('show');
        }

        function closeEditor() {
            document.getElementById('editorModal').classList.remove('show');
        }

        function renderStageEditor(stages) {
            const list = document.getElementById('stageEditorList');
            list.innerHTML = stages.map((s, i) => `
                <div class="stage-config">
                    <div class="stage-config-header">
                        <span class="stage-config-title">阶段 ${i + 1}</span>
                        ${stages.length > 1 ? `<button class="recipe-item-btn" onclick="removeStage(${i})">删除</button>` : ''}
                    </div>
                    <div class="stage-config-row">
                        <div class="stage-config-field">
                            <label>粉重倍数</label>
                            <input type="number" step="0.5" value="${s.multiplier}" id="stageMultiplier${i}">
                        </div>
                        <div class="stage-config-field">
                            <label>目标流速 g/s</label>
                            <input type="number" step="0.5" value="${s.targetFlow}" id="stageFlow${i}">
                        </div>
                        <div class="stage-config-field">
                            <label>提前喊停 g</label>
                            <input type="number" value="${s.stopEarly}" id="stageStop${i}">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addStage() {
            const stages = getStagesFromEditor();
            stages.push({ multiplier: 15, targetFlow: 4, stopEarly: 4 });
            renderStageEditor(stages);
        }

        function removeStage(index) {
            const stages = getStagesFromEditor();
            stages.splice(index, 1);
            renderStageEditor(stages);
        }

        function getStagesFromEditor() {
            const list = document.getElementById('stageEditorList');
            const configs = list.querySelectorAll('.stage-config');
            const stages = [];
            configs.forEach((config, i) => {
                stages.push({
                    multiplier: parseFloat(document.getElementById(`stageMultiplier${i}`).value) || 15,
                    targetFlow: parseFloat(document.getElementById(`stageFlow${i}`).value) || 4,
                    stopEarly: parseFloat(document.getElementById(`stageStop${i}`).value) || 4
                });
            });
            return stages;
        }

        function saveRecipe() {
            const name = document.getElementById('editName').value.trim();
            const ratio = document.getElementById('editRatio').value.trim();
            const coffeeWeight = parseFloat(document.getElementById('editCoffeeWeight').value) || 15;
            const stages = getStagesFromEditor();

            if (!name) {
                alert('请输入方案名称');
                return;
            }
            if (!stages.length) {
                alert('请至少保留一个注水阶段');
                return;
            }
            if (coffeeWeight <= 0 || stages.some(s => s.multiplier <= 0 || s.targetFlow <= 0 || s.stopEarly < 0)) {
                alert('请填写有效的方案参数（必须大于 0）');
                return;
            }

            if (editingRecipeId) {
                const index = recipes.findIndex(r => r.id === editingRecipeId);
                if (index >= 0) {
                    recipes[index] = { ...recipes[index], name, ratio, defaultCoffeeWeight: coffeeWeight, stages };
                }
            } else {
                recipes.push({
                    id: 'custom-' + Date.now(),
                    name,
                    ratio,
                    defaultCoffeeWeight: coffeeWeight,
                    stages
                });
            }

            saveRecipes();
            closeEditor();
            renderRecipePageList();
            switchPage('recipe');
        }

        function deleteRecipe() {
            if (!editingRecipeId) return;
            if (!confirm('确定删除此方案？')) return;

            recipes = recipes.filter(r => r.id !== editingRecipeId);
            if (currentRecipe && currentRecipe.id === editingRecipeId) {
                if (recipes.length === 0) {
                    recipes = cloneDefaults();
                }
                selectRecipe(recipes[0]);
            }
            saveRecipes();
            closeEditor();
            renderRecipePageList();
            switchPage('recipe');
        }

        // ==================== 蓝牙连接 ====================
        async function connect() {
            if (connected) {
                disconnect();
                return;
            }

            try {
                statusDot.classList.add('connecting');
                deviceName.textContent = '扫描中...';

                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'TIMEMORE' }],
                    optionalServices: [SERVICE_UUID]
                });

                deviceName.textContent = '连接中...';
                device.addEventListener('gattserverdisconnected', onDisconnected);

                await new Promise(resolve => setTimeout(resolve, 100));
                server = await device.gatt.connect();
                await new Promise(resolve => setTimeout(resolve, 200));

                const service = await server.getPrimaryService(SERVICE_UUID);
                const [data, ctrl] = await Promise.all([
                    service.getCharacteristic(DATA_CHAR_UUID),
                    service.getCharacteristic(CTRL_CHAR_UUID)
                ]);

                dataChar = data;
                ctrlChar = ctrl;

                await dataChar.startNotifications();
                dataChar.addEventListener('characteristicvaluechanged', onData);

                connected = true;
                statusDot.classList.remove('connecting');
                statusDot.classList.add('connected');
                deviceName.textContent = device.name || 'TIMEMORE DOT';
                connectBtn.textContent = '断开连接';
                connectBtn.classList.add('connected');

                setState(STATES.WEIGHING);

            } catch (e) {
                statusDot.classList.remove('connecting');
                deviceName.textContent = '连接失败: ' + (e && e.message ? e.message : '未知错误');
                console.error(e);
            }
        }

        function disconnect() {
            if (device && device.gatt.connected) {
                device.gatt.disconnect();
            }
        }

        function onDisconnected() {
            connected = false;
            if (dataChar) dataChar.removeEventListener('characteristicvaluechanged', onData);
            if (device) device.removeEventListener('gattserverdisconnected', onDisconnected);
            dataChar = null;
            ctrlChar = null;
            server = null;
            device = null;
            statusDot.classList.remove('connected');
            deviceName.textContent = '未连接';
            connectBtn.textContent = '连接电子秤';
            connectBtn.classList.remove('connected');
            weightEl.textContent = '0.0';
            resetBrew();
            setState(STATES.IDLE);
        }

        // ==================== 数据处理 ====================
        function onData(e) {
            const data = new Uint8Array(e.target.value.buffer);

            if (data[0] === 0xA5 && data[1] === 0x5A && data.length >= 10) {
                const raw = (data[8] << 8) | data[9];
                const weight = raw > 30000 ? (raw - 65536) * 0.1 : raw * 0.1;

                const now = Date.now();
                let flow = 0;

                if (lastTime > 0 && isRecording) {
                    const dt = (now - lastTime) / 1000;
                    if (dt > 0) {
                        flow = Math.max(0, (weight - lastWeight) / dt);
                        updateFlowStatus(flow);
                    }
                }

                currentWeight = weight;
                lastWeight = weight;
                lastTime = now;

                weightEl.textContent = weight.toFixed(1);
                weightEl.classList.toggle('negative', weight < 0);

                // 在加粉状态下实时更新UI
                if (currentState === STATES.ADD_POWDER) {
                    guideSub.textContent = `当前粉重: ${weight.toFixed(1)}g`;
                    mainBtn.disabled = weight < 2;
                    // 更新方案区域显示预计注水量
                    updateAddPowderRecipe(weight);
                }

                if (isRecording) {
                    if (weight > maxRecordedWeight) {
                        maxRecordedWeight = weight;
                    }

                    // 检测滤杯被拿走（阈值与粉量关联）
                    const dropThreshold = Math.max(50, coffeeWeight * 0.3);
                    if (maxRecordedWeight > dropThreshold && maxRecordedWeight - weight > dropThreshold) {
                        lowWeightCount++;
                        if (lowWeightCount >= 3) {
                            finalWaterWeight = maxRecordedWeight;
                            stopRecord();
                            stopFlowBeep(); // 停止流速报警音
                            // 截断数据，移除重量下降的部分
                            // 从后往前找到重量开始下降的点
                            let cutIndex = weightData.length;
                            for (let i = weightData.length - 1; i >= 1; i--) {
                                // 找到第一个重量比下一个点高的点（下降开始）
                                if (weightData[i].weight > weightData[i-1].weight + 2) {
                                    cutIndex = i;
                                    break;
                                }
                            }
                            weightData = weightData.slice(0, cutIndex);
                            saveHistory();
                            speak('冲煮结束');
                            setState(STATES.END);
                            return;
                        }
                    } else {
                        lowWeightCount = 0;
                    }

                    const elapsed = (now - recordStartTime) / 1000;

                    // 数据验证：过滤异常的重量下降（蓝牙数据错误）
                    // 冲煮过程中重量应该只增加或保持稳定，突然下降超过5g是异常数据
                    if (weightData.length > 0) {
                        const lastData = weightData[weightData.length - 1];
                        const weightDrop = lastData.weight - weight;
                        if (weightDrop > 5) {
                            // 忽略这个异常数据点，但更新时间避免流速计算失真
                            log('忽略异常数据:', weight.toFixed(1), 'g, 上一个:', lastData.weight.toFixed(1), 'g');
                            lastTime = now;
                            return;
                        }
                    }

                    weightData.push({ time: elapsed, weight, flow: smoothFlow });
                    if (weightData.length > 2400) weightData.shift();

                    // 检查阶段完成
                    checkStageCompletion(weight);

                    // 更新进度条
                    updateProgressAnimation(weight);
                }
            }
        }

        function checkStability(weight) {
            // 简化稳定性检测
        }

        // 流速提醒定时器
        let flowBeepInterval = null;
        let lastFlowStatus = null;
        let flowStatusStartTime = 0; // 状态开始时间
        const FLOW_STATUS_DELAY = 200; // 持续0.2秒异常才报警
        let currentBeepType = null; // 当前滴声类型

        function updateFlowStatus(flow) {
            if (flow > 20) return;

            smoothFlow = smoothFlow * 0.85 + flow * 0.15;
            flowEl.textContent = smoothFlow.toFixed(1);

            if (!currentRecipe || currentStageIndex < 0) {
                stopFlowBeep();
                return;
            }

            const stage = currentRecipe.stages[currentStageIndex];
            const targetFlow = stage.targetFlow;
            const ratio = smoothFlow / targetFlow;

            let newStatus = '';
            let statusClass = '';
            let beepInterval = 0; // 滴声间隔，毫秒
            let beepType = null; // 滴声类型: 'low' 或 'high'

            if (smoothFlow < 0.5) {
                newStatus = '';
                statusClass = '';
            } else if (ratio < 0.9) {
                newStatus = '偏低';
                statusClass = 'low';
                beepInterval = 800; // 慢速嘟
                beepType = 'low';
            } else if (ratio <= 1.3) {
                newStatus = '正常';
                statusClass = 'normal';
            } else if (ratio <= 1.5) {
                newStatus = '偏快';
                statusClass = 'high';
                beepInterval = 400; // 中速滴
                beepType = 'high';
            } else {
                newStatus = '过快';
                statusClass = 'danger';
                beepInterval = 200; // 快速滴
                beepType = 'high';
            }

            flowStatus.textContent = newStatus;
            flowStatus.className = 'flow-status ' + statusClass;

            // 状态变化时重置计时
            if (statusClass !== lastFlowStatus) {
                flowStatusStartTime = Date.now();
                lastFlowStatus = statusClass;
                stopFlowBeep();
            }

            // 只有持续异常一段时间才报警
            if (beepInterval > 0 && Date.now() - flowStatusStartTime >= FLOW_STATUS_DELAY) {
                if (!flowBeepInterval || currentBeepType !== beepType) {
                    stopFlowBeep();
                    currentBeepType = beepType;
                    startFlowBeep(beepInterval, beepType);
                }
            }
        }

        function startFlowBeep(interval, type) {
            if (flowBeepInterval) return;
            playFlowBeep(type); // 立即响一声
            flowBeepInterval = setInterval(() => {
                playFlowBeep(type);
            }, interval);
        }

        // 播放流速报警音：低速用嘟（低沉），高速用滴（尖锐）
        function playFlowBeep(type) {
            if (type === 'low') {
                // 嘟：低频长音（正弦波）
                beep(300, 150, 'sine');
            } else {
                // 滴：高频短音（方波，像电子蜂鸣器）
                beep(1500, 50, 'square');
            }
        }

        function stopFlowBeep() {
            if (flowBeepInterval) {
                clearInterval(flowBeepInterval);
                flowBeepInterval = null;
            }
        }

        // ==================== 状态机 ====================
        function setState(state) {
            currentState = state;
            stateBadge.textContent = STATE_LABELS[state] || state;
            stateBadge.className = 'state-badge ' + (state === STATES.BREWING ? 'brewing' : '');
            updateUI();
        }

        function updateUI() {
            tareBtn.disabled = !connected;

            switch (currentState) {
                case STATES.IDLE:
                    guideIcon.textContent = '🔗';
                    guideText.textContent = '请连接电子秤';
                    guideSub.textContent = '点击底部按钮开始连接';
                    mainBtn.disabled = true;
                    mainBtn.textContent = '手冲咖啡';
                    document.getElementById('recipeSection').style.display = 'none';
                    document.getElementById('stagesSection').style.display = 'none';
                    document.getElementById('metricsSection').style.display = 'none';
                    document.getElementById('chartSection').style.display = 'none';
                    weightStatus.style.display = 'block';
                    break;

                case STATES.WEIGHING:
                    guideIcon.textContent = '⚖️';
                    guideText.textContent = '称重模式';
                    guideSub.textContent = '点击"手冲咖啡"开始';
                    mainBtn.disabled = false;
                    mainBtn.textContent = '手冲咖啡';
                    document.getElementById('recipeSection').style.display = 'none';
                    document.getElementById('stagesSection').style.display = 'none';
                    document.getElementById('metricsSection').style.display = 'none';
                    document.getElementById('chartSection').style.display = 'none';
                    weightStatus.style.display = 'block';
                    // 恢复去皮按钮
                    tareBtn.textContent = '去皮';
                    tareBtn.disabled = !connected;
                    break;

                case STATES.ADD_POWDER:
                    guideIcon.textContent = '☕';
                    guideText.textContent = '请加入咖啡粉';
                    guideSub.textContent = `当前粉重: ${currentWeight.toFixed(1)}g`;
                    mainBtn.disabled = currentWeight < 2;
                    mainBtn.textContent = '开始冲煮';
                    document.getElementById('recipeSection').style.display = 'block';
                    document.getElementById('stagesSection').style.display = 'none';
                    document.getElementById('metricsSection').style.display = 'none';
                    document.getElementById('chartSection').style.display = 'none';
                    weightStatus.style.display = 'block';
                    // 显示取消按钮
                    tareBtn.textContent = '取消';
                    tareBtn.disabled = false;
                    break;

                case STATES.COUNTDOWN:
                    guideIcon.textContent = '⏱️';
                    guideText.textContent = `${countdown}`;
                    guideSub.textContent = '';
                    mainBtn.disabled = true;
                    mainBtn.textContent = `${countdown}...`;
                    document.getElementById('recipeSection').style.display = 'block';
                    document.getElementById('stagesSection').style.display = 'block';
                    document.getElementById('metricsSection').style.display = 'flex';
                    document.getElementById('chartSection').style.display = 'none';
                    weightStatus.style.display = 'none';
                    renderStagesTrack();
                    // 倒计时阶段禁用按钮
                    tareBtn.textContent = '去皮';
                    tareBtn.disabled = true;
                    break;

                case STATES.BREWING:
                    updateBrewingUI();
                    document.getElementById('recipeSection').style.display = 'block';
                    document.getElementById('stagesSection').style.display = 'block';
                    document.getElementById('metricsSection').style.display = 'flex';
                    document.getElementById('chartSection').style.display = 'block';
                    weightStatus.style.display = 'none';
                    // 冲煮阶段禁用去皮按钮
                    tareBtn.textContent = '去皮';
                    tareBtn.disabled = true;
                    break;

                case STATES.END:
                    guideIcon.textContent = '🎉';
                    guideText.textContent = '冲煮完成！';
                    guideSub.textContent = `总注水量: ${finalWaterWeight.toFixed(0)}g`;
                    weightEl.textContent = finalWaterWeight.toFixed(1);
                    mainBtn.disabled = false;
                    mainBtn.textContent = '返回称重';
                    document.getElementById('recipeSection').style.display = 'block';
                    document.getElementById('stagesSection').style.display = 'block';
                    document.getElementById('metricsSection').style.display = 'flex';
                    document.getElementById('chartSection').style.display = 'block';
                    weightStatus.style.display = 'block';
                    weightStatus.innerHTML = `<span style="color:#4ade80">总注水量 ${finalWaterWeight.toFixed(0)}g</span>`;
                    // 完成阶段禁用去皮按钮
                    tareBtn.textContent = '去皮';
                    tareBtn.disabled = true;
                    break;
            }
        }

        function updateBrewingUI() {
            const stage = currentRecipe.stages[currentStageIndex];
            const targetWeight = coffeeWeight * stage.multiplier;

            if (stageCompletedFlags[currentStageIndex]) {
                guideIcon.textContent = '⏳';
                guideText.textContent = '等待滴滤完成';
                if (currentStageIndex < currentRecipe.stages.length - 1) {
                    guideSub.textContent = currentStageIndex === 0 ? '开始注水' : '再注水';
                } else {
                    guideSub.textContent = '再拿走咖啡';
                }
            } else {
                guideIcon.textContent = '💧';
                guideText.textContent = `阶段${currentStageIndex + 1}：注水至 ${targetWeight.toFixed(0)}g`;
                guideSub.textContent = '';
            }

            mainBtn.disabled = false;
            mainBtn.textContent = '结束冲煮';
        }

        function checkStageCompletion(weight) {
            if (currentStageIndex < 0 || currentStageIndex >= currentRecipe.stages.length) return;

            const stage = currentRecipe.stages[currentStageIndex];
            const targetWeight = coffeeWeight * stage.multiplier;

            // 只有当重量超过一定阈值（粉重的0.5倍）才开始检测，避免去皮后的波动误触发
            const minThreshold = coffeeWeight * 0.5;
            if (weight < minThreshold) return;

            // 调试信息
            log(`阶段检测: 粉重=${coffeeWeight}g, 目标=${targetWeight.toFixed(1)}g, 当前=${weight.toFixed(1)}g, 提前=${stage.stopEarly}g, 已完成=${stageCompletedFlags[currentStageIndex]}`);

            if (!stageCompletedFlags[currentStageIndex] && weight >= targetWeight - stage.stopEarly) {
                log('>>> 触发喊停！ <<<');
                stageCompletedFlags[currentStageIndex] = true;
                beep(800, 200);
                speak('停');
                updateStageUI();
                updateUI();
            }

            // 检测进入下一阶段
            if (stageCompletedFlags[currentStageIndex] && currentStageIndex < currentRecipe.stages.length - 1) {
                if (weight > targetWeight + 5) {
                    log(`>>> 切换到阶段 ${currentStageIndex + 2} <<<`);
                    currentStageIndex++;
                    updateStageUI();
                    updateUI();
                }
            }
        }

        function updateProgressAnimation(weight) {
            if (currentStageIndex < 0) return;

            const stage = currentRecipe.stages[currentStageIndex];
            const targetWeight = coffeeWeight * stage.multiplier;

            const prevTarget = currentStageIndex > 0
                ? coffeeWeight * currentRecipe.stages[currentStageIndex - 1].multiplier
                : 0;

            if (!stageCompletedFlags[currentStageIndex]) {
                const progress = Math.min(100, Math.max(0, ((weight - prevTarget) / (targetWeight - prevTarget)) * 100));
                const progressEl = document.getElementById(`progress${currentStageIndex}`);
                if (progressEl) progressEl.style.width = progress + '%';
            }
        }

        function renderStagesTrack() {
            const track = document.getElementById('stagesTrack');
            const stages = currentRecipe.stages;

            let html = '<div class="stage-node"><div class="stage-circle completed" id="stage0">✓</div><span class="stage-label">加粉</span></div>';

            stages.forEach((s, i) => {
                const targetWeight = coffeeWeight * s.multiplier;
                html += `
                    <div class="stage-connector" id="conn${i}"><div class="stage-connector-progress" id="progress${i}"></div></div>
                    <div class="stage-node">
                        <div class="stage-circle" id="stage${i + 1}">${targetWeight.toFixed(0)}</div>
                        <span class="stage-label">阶段${i + 1}</span>
                    </div>
                `;
            });

            track.innerHTML = html;
        }

        function updateStageUI() {
            for (let i = 0; i < currentRecipe.stages.length; i++) {
                const el = document.getElementById(`stage${i + 1}`);
                const conn = document.getElementById(`conn${i}`);
                const progress = document.getElementById(`progress${i}`);

                if (stageCompletedFlags[i]) {
                    el.classList.add('completed');
                    el.classList.remove('active');
                    el.textContent = '✓';
                    if (conn) conn.classList.add('completed');
                    if (progress) progress.style.width = '100%';
                } else if (i === currentStageIndex) {
                    el.classList.add('active');
                    el.classList.remove('completed');
                } else {
                    el.classList.remove('completed', 'active');
                }
            }
        }

        // ==================== 操作处理 ====================
        async function handleMainAction() {
            switch (currentState) {
                case STATES.WEIGHING:
                    mainBtn.disabled = true;
                    mainBtn.textContent = '准备中...';
                    await sendTare();
                    coffeeWeight = 0;
                    currentWeight = 0;
                    weightEl.textContent = '0.0';
                    await delay(500);
                    setState(STATES.ADD_POWDER);
                    break;

                case STATES.ADD_POWDER:
                    coffeeWeight = currentWeight;
                    log('记录粉重:', coffeeWeight, 'g');
                    await sendTare({ skipResetCoffeeWeight: true });
                    currentWeight = 0;
                    weightEl.textContent = '0.0';
                    await delay(500);
                    startCountdown();
                    break;

                case STATES.BREWING:
                    finalWaterWeight = currentWeight;
                    stopRecord();
                    stopFlowBeep(); // 停止流速报警音
                    saveHistory();
                    setState(STATES.END);
                    break;

                case STATES.END:
                    resetBrew();
                    setState(STATES.WEIGHING);
                    break;
            }
        }

        function startCountdown() {
            countdown = 3;
            setState(STATES.COUNTDOWN);
            speak('3');

            countdownInterval = setInterval(() => {
                countdown--;
                if (countdown > 0) {
                    guideText.textContent = `${countdown}`;
                    mainBtn.textContent = `${countdown}...`;
                    speak(countdown.toString());
                } else {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    speak('开始');
                    startBrew();
                }
            }, 1000);
        }

        async function startBrew() {
            // 不再去皮，因为在加粉阶段已经去皮了
            // await sendTare();

            currentStageIndex = 0;
            stageCompletedFlags = new Array(currentRecipe.stages.length).fill(false);

            // 重置记录状态
            maxRecordedWeight = 0;
            lowWeightCount = 0;
            currentWeight = 0;

            log('开始冲煮:', {
                recipe: currentRecipe.name,
                coffeeWeight: coffeeWeight,
                stages: currentRecipe.stages.map(s => ({
                    multiplier: s.multiplier,
                    targetWeight: coffeeWeight * s.multiplier,
                    stopEarly: s.stopEarly
                }))
            });

            renderStagesTrack();

            // 标记加粉完成
            document.getElementById('stage0').classList.add('completed');

            isRecording = true;
            recordStartTime = Date.now();
            weightData = [];

            recordInterval = setInterval(() => {
                updateTimer();
                drawChart();
            }, 100);

            setState(STATES.BREWING);
        }

        function stopRecord() {
            isRecording = false;
            if (recordInterval) {
                clearInterval(recordInterval);
                recordInterval = null;
            }
        }

        function resetBrew() {
            stopRecord();
            stopFlowBeep();
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            countdown = 0;
            weightData = [];
            smoothFlow = 0;
            lastWeight = 0;
            lastTime = 0;
            maxRecordedWeight = 0;
            lowWeightCount = 0;
            finalWaterWeight = 0;
            currentStageIndex = -1;
            stageCompletedFlags = [];
            coffeeWeight = 0;
            timerEl.textContent = '00:00';
            flowEl.textContent = '0.0';
            flowStatus.textContent = '';
            flowStatus.className = 'flow-status';
            weightStatus.innerHTML = '<span>--</span>';
            lastFlowStatus = null;
            currentBeepType = null;
            drawChart();
        }

        async function sendTare(options = {}) {
            const { skipResetCoffeeWeight } = options;
            if (!ctrlChar) return;
            try {
                await ctrlChar.writeValueWithoutResponse(TARE_CMD);
                if (!skipResetCoffeeWeight && currentState === STATES.ADD_POWDER) {
                    coffeeWeight = 0;
                    currentWeight = 0;
                    weightEl.textContent = '0.0';
                    guideSub.textContent = '当前粉重: 0.0g';
                    mainBtn.disabled = true;
                }
            } catch (e) {
                console.error('去皮失败', e);
            }
        }

        function handleTareAction() {
            if (currentState === STATES.ADD_POWDER) {
                // 取消加粉，返回称重模式
                resetBrew();
                setState(STATES.WEIGHING);
            } else {
                // 正常去皮
                sendTare();
            }
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - recordStartTime) / 1000);
            const m = Math.floor(elapsed / 60);
            const s = elapsed % 60;
            timerEl.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ==================== 曲线绘制 ====================
        function drawChart() {
            const w = canvas.width;
            const h = canvas.height;

            ctx.fillStyle = '#0d0d0d';
            ctx.fillRect(0, 0, w, h);

            // 时间刻度
            ctx.fillStyle = '#444';
            ctx.font = '9px sans-serif';
            ctx.textAlign = 'center';

            const maxTime = weightData.length > 0 ? Math.max(...weightData.map(d => d.time), 180) : 180;

            for (let t = 0; t <= maxTime; t += 30) {
                const x = (t / maxTime) * w;
                ctx.fillText(formatTime(t), x, h - 2);
            }

            if (weightData.length < 2) return;

            const weights = weightData.map(d => d.weight);
            const maxW = Math.max(...weights, 100);
            const minW = Math.min(...weights, 0);
            const rangeW = maxW - minW + 20;

            ctx.strokeStyle = '#4ade80';
            ctx.lineWidth = 2;
            ctx.beginPath();
            weightData.forEach((d, i) => {
                const x = (d.time / maxTime) * w;
                const y = h - ((d.weight - minW + 10) / rangeW) * (h - 16) * 0.9 - 14;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            if (m > 0) return `${m}'${s.toString().padStart(2, '0')}`;
            return `${s}s`;
        }

        // ==================== 语音和声音 ====================
        let audioCtx = null;

        function getAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1.2;
                speechSynthesis.speak(utterance);
            }
        }

        function beep(frequency = 800, duration = 150, type = 'sine') {
            const ctx = getAudioCtx();
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = type;

            gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration / 1000);

            oscillator.start(ctx.currentTime);
            oscillator.stop(ctx.currentTime + duration / 1000);
        }

        // ==================== 历史 ====================
        function saveHistory() {
            const finalWeight = Math.max(finalWaterWeight, maxRecordedWeight, currentWeight, 0);
            const record = {
                id: Date.now(),
                date: new Date().toISOString(),
                recipe: currentRecipe ? currentRecipe.name : '',
                coffeeWeight,
                maxWeight: finalWeight,
                duration: weightData.length > 0 ? weightData[weightData.length - 1].time : 0,
                data: [...weightData] // 保存完整数据用于查看详情
            };

            history.unshift(record);
            if (history.length > 30) history.pop();
            localStorage.setItem('brewHistory', JSON.stringify(history));
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (history.length === 0) {
                list.innerHTML = '<p style="color:#555;text-align:center;padding:40px;">暂无冲煮记录</p>';
                return;
            }

            list.innerHTML = history.map((r, i) => `
                <div class="history-item" onclick="showHistoryDetail(${i})">
                    <div class="history-header">
                        <span class="history-recipe">${r.recipe || '自定义冲煮'}</span>
                        <span class="history-time">${formatHistoryTime(r.date)}</span>
                    </div>
                    <div class="history-summary">
                        <span>粉重 <span class="value">${(Number(r.coffeeWeight) || 0).toFixed(1)}g</span></span>
                        <span>注水 <span class="value">${(Number(r.maxWeight) || 0).toFixed(0)}g</span></span>
                        <span>时长 <span class="value">${formatDuration(Number(r.duration) || 0)}</span></span>
                    </div>
                </div>
            `).join('');
        }

        function formatHistoryTime(dateStr) {
            const d = new Date(dateStr);
            const now = new Date();
            const diff = now - d;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 172800000) return '昨天';
            return d.toLocaleDateString();
        }

        function formatDuration(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function showHistoryDetail(index) {
            currentHistoryIndex = index;
            const record = history[index];
            if (!record) return;

            document.getElementById('historyDetailTitle').textContent = record.recipe || '冲煮详情';

            // 计算平均流速
            let avgFlow = 0;
            if (record.data && record.data.length > 0) {
                const flows = record.data.filter(d => d.flow > 0).map(d => d.flow);
                avgFlow = flows.length > 0 ? flows.reduce((a, b) => a + b, 0) / flows.length : 0;
            }

            document.getElementById('historyDetailStats').innerHTML = `
                <div class="detail-stat">
                    <div class="detail-stat-label">咖啡粉重</div>
                    <div class="detail-stat-value green">${(Number(record.coffeeWeight) || 0).toFixed(1)}g</div>
                </div>
                <div class="detail-stat">
                    <div class="detail-stat-label">总注水量</div>
                    <div class="detail-stat-value">${(Number(record.maxWeight) || 0).toFixed(1)}g</div>
                </div>
                <div class="detail-stat">
                    <div class="detail-stat-label">冲煮时长</div>
                    <div class="detail-stat-value">${formatDuration(Number(record.duration) || 0)}</div>
                </div>
                <div class="detail-stat">
                    <div class="detail-stat-label">平均流速</div>
                    <div class="detail-stat-value">${avgFlow.toFixed(1)}g/s</div>
                </div>
            `;

            // 绘制历史曲线
            drawHistoryChart(record.data || []);

            document.getElementById('historyDetailModal').classList.add('show');
        }

        function closeHistoryDetail() {
            document.getElementById('historyDetailModal').classList.remove('show');
        }

        function deleteHistoryRecord() {
            if (currentHistoryIndex < 0 || currentHistoryIndex >= history.length) return;
            if (!confirm('确定删除此记录？')) return;

            history.splice(currentHistoryIndex, 1);
            localStorage.setItem('brewHistory', JSON.stringify(history));
            closeHistoryDetail();
            renderHistory();
        }

        function drawHistoryChart(data) {
            const canvas = historyCanvas;
            const ctx = historyCtx;
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 16;
            canvas.height = 120;

            const w = canvas.width;
            const h = canvas.height;

            ctx.fillStyle = '#0d0d0d';
            ctx.fillRect(0, 0, w, h);

            if (data.length < 2) {
                ctx.fillStyle = '#555';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('无数据', w / 2, h / 2);
                return;
            }

            // 时间刻度
            ctx.fillStyle = '#444';
            ctx.font = '9px sans-serif';
            ctx.textAlign = 'center';

            const maxTime = Math.max(...data.map(d => d.time), 60);
            for (let t = 0; t <= maxTime; t += 30) {
                const x = (t / maxTime) * w;
                ctx.fillText(formatTime(t), x, h - 2);
            }

            const weights = data.map(d => d.weight);
            const maxW = Math.max(...weights, 100);
            const minW = Math.min(...weights, 0);
            const rangeW = maxW - minW + 20;

            ctx.strokeStyle = '#4ade80';
            ctx.lineWidth = 2;
            ctx.beginPath();
            data.forEach((d, i) => {
                const x = (d.time / maxTime) * w;
                const y = h - ((d.weight - minW + 10) / rangeW) * (h - 16) * 0.9 - 14;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        // 点击弹窗外部关闭
        document.getElementById('editorModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditor();
        });
        document.getElementById('historyDetailModal').addEventListener('click', function(e) {
            if (e.target === this) closeHistoryDetail();
        });

        // 启动
        init();
    </script>
</body>
</html>
