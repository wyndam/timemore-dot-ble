<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆形屏幕预览 - 1.28" 240x240</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 {
            color: #888;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .screen-container {
            position: relative;
        }
        .screen {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        }
        .weight-section {
            margin-top: 30px;
            text-align: center;
        }
        .weight-value {
            font-size: 42px;
            font-weight: 200;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            line-height: 1;
        }
        .weight-unit {
            color: #666;
            font-size: 16px;
            margin-left: 2px;
        }
        .timer {
            color: #ffaa00;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            margin-top: 5px;
        }
        .recording-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ff4444;
            border-radius: 50%;
            margin-left: 8px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        .chart-section {
            margin-top: 10px;
            width: 180px;
            height: 100px;
        }
        .chart-section canvas {
            width: 100%;
            height: 100%;
        }
        .buttons-hint {
            position: absolute;
            bottom: 25px;
            color: #666;
            font-size: 10px;
            text-align: center;
        }
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }
        button {
            background: #333;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #444;
        }
        .toggle-btn {
            background: #00aa66;
        }
        .toggle-btn.active {
            background: #ff4444;
        }
    </style>
</head>
<body>
    <h1>1.28" 圆形屏幕预览 (240×240)</h1>

    <div class="screen-container">
        <div class="screen">
            <div class="weight-section">
                <span class="weight-value" id="weight">123.4</span>
                <span class="weight-unit">g</span>
                <div class="timer">
                    <span id="timer">01:23</span>
                    <span class="recording-dot" id="recordingDot" style="display: none;"></span>
                </div>
            </div>

            <div class="chart-section">
                <canvas id="chart" width="180" height="100"></canvas>
            </div>

            <div class="buttons-hint">A:去皮  B:记录  C:清除</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="toggleRecording()" id="recordBtn" class="toggle-btn">开始记录</button>
        <button onclick="clearChart()">清除曲线</button>
    </div>

    <script>
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        const weightEl = document.getElementById('weight');
        const timerEl = document.getElementById('timer');
        const recordBtn = document.getElementById('recordBtn');
        const recordingDot = document.getElementById('recordingDot');

        let isRecording = false;
        let startTime = null;
        let weightData = [];
        let animationId = null;

        // 模拟重量数据
        let currentWeight = 0;
        let targetWeight = 0;

        function generateWeight() {
            // 模拟注水曲线
            if (isRecording && weightData.length < 300) {
                targetWeight += (Math.random() - 0.3) * 3;
                targetWeight = Math.max(0, targetWeight);
            }
            currentWeight += (targetWeight - currentWeight) * 0.1;
            return currentWeight;
        }

        function toggleRecording() {
            isRecording = !isRecording;
            if (isRecording) {
                startTime = Date.now();
                weightData = [];
                targetWeight = 0;
                currentWeight = 0;
                recordBtn.textContent = '停止记录';
                recordBtn.classList.add('active');
                recordingDot.style.display = 'inline-block';
            } else {
                recordBtn.textContent = '开始记录';
                recordBtn.classList.remove('active');
                recordingDot.style.display = 'none';
            }
        }

        function clearChart() {
            weightData = [];
            startTime = Date.now();
            targetWeight = 0;
            currentWeight = 0;
        }

        function updateTimer() {
            if (isRecording && startTime) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                timerEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        function drawChart() {
            const width = canvas.width;
            const height = canvas.height;

            // 清空
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            if (weightData.length < 2) return;

            // 计算范围
            const maxWeight = Math.max(...weightData.map(d => d.weight), 100);
            const minWeight = Math.min(...weightData.map(d => d.weight), 0);
            const range = maxWeight - minWeight + 10;

            // 绘制曲线
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 1.5;
            ctx.beginPath();

            for (let i = 0; i < weightData.length; i++) {
                const x = (i / (weightData.length - 1)) * width;
                const y = height - ((weightData[i].weight - minWeight + 5) / range) * height;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();
        }

        function animate() {
            const weight = generateWeight();
            weightEl.textContent = weight.toFixed(1);

            if (isRecording) {
                weightData.push({ time: Date.now(), weight: weight });
                if (weightData.length > 300) weightData.shift();
            }

            updateTimer();
            drawChart();

            animationId = requestAnimationFrame(animate);
        }

        // 初始绘制
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 开始动画
        animate();
    </script>
</body>
</html>
